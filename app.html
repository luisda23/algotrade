<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>YudBot · App</title>
<meta name="description" content="Crea, gestiona y descarga tus bots de trading"/>
<meta name="robots" content="noindex,nofollow"/>
<meta name="theme-color" content="#000000"/>
<link rel="icon" type="image/png" href="/icon-192.png"/>
<link rel="manifest" href="/manifest.json"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
// Apply theme before paint to prevent flash. Default is light.
(() => {
  const stored = localStorage.getItem('theme');
  if (stored !== 'dark') document.documentElement.setAttribute('data-theme', 'light');
})();
</script>

<style>
:root {
  --bg: #000000;
  --bg-soft: #050505;
  --bg-card: #0A0A0A;
  --bg-elev: #141414;
  --bg-input: #0F0F0F;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.18);
  --text: #FFFFFF;
  --text-dim: rgba(255,255,255,0.65);
  --text-mute: rgba(255,255,255,0.4);
  --pos: #00D17A;
  --pos-soft: rgba(0,209,122,0.12);
  --neg: #FF4757;
  --neg-soft: rgba(255,71,87,0.12);
  --warn: #F59E0B;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

[data-theme="light"] {
  --bg: #FFFFFF;
  --bg-soft: #FAFAFA;
  --bg-card: #F5F5F5;
  --bg-elev: #EEEEEE;
  --bg-input: #FFFFFF;
  --border: rgba(0,0,0,0.10);
  --border-strong: rgba(0,0,0,0.20);
  --text: #000000;
  --text-dim: rgba(0,0,0,0.65);
  --text-mute: rgba(0,0,0,0.4);
}

html, body { transition: background-color 0.3s var(--ease), color 0.3s var(--ease); }

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'cv11', 'ss01';
  line-height: 1.5;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--text-mute); }
::selection { background: var(--text); color: var(--bg); }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes dotPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }

.fade-up { animation: fadeUp 0.5s var(--ease); }
.fade-in { animation: fadeIn 0.4s ease; }

/* Modern B/W slider */
.slider-modern {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 999px;
  background: linear-gradient(to right,
    var(--text) 0%,
    var(--text) var(--val, 50%),
    rgba(127,127,127,0.18) var(--val, 50%),
    rgba(127,127,127,0.18) 100%);
  outline: none;
  cursor: pointer;
  margin: 4px 0;
}
.slider-modern::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--text);
  border: 4px solid var(--bg);
  box-shadow: 0 0 0 1px rgba(127,127,127,0.4), 0 4px 14px rgba(0,0,0,0.35);
  cursor: grab;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.slider-modern::-webkit-slider-thumb:hover {
  transform: scale(1.15);
  box-shadow: 0 0 0 1px var(--text), 0 6px 18px rgba(0,0,0,0.4);
}
.slider-modern::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.05); }
.slider-modern::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--text);
  border: 4px solid var(--bg);
  box-shadow: 0 0 0 1px rgba(127,127,127,0.4), 0 4px 14px rgba(0,0,0,0.35);
  cursor: grab;
}
.slider-modern::-moz-range-track {
  height: 6px;
  border-radius: 999px;
  background: rgba(127,127,127,0.18);
}
.slider-modern::-moz-range-progress {
  height: 6px;
  border-radius: 999px;
  background: var(--text);
}

/* ===================== LAYOUT ===================== */
.app-shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}
@media (max-width: 1023px) {
  .app-shell { grid-template-columns: 1fr; }
}

/* Sidebar (desktop) */
.sidebar {
  background: var(--bg-soft);
  border-right: 1px solid var(--border);
  padding: 28px 18px;
  display: flex;
  flex-direction: column;
  position: sticky; top: 0;
  height: 100vh;
  overflow-y: auto;
}
@media (max-width: 1023px) { .sidebar { display: none; } }

.brand {
  display: flex; align-items: center; gap: 11px;
  padding: 0 12px 28px;
  font-family: 'Inter Tight', sans-serif;
  font-weight: 700; font-size: 18px;
  letter-spacing: -0.3px;
}
.brand-logo {
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  line-height: 0;
}
.brand-logo-img { display: block; object-fit: contain; }

/* Logo theme-switch */
.logo-on-dark { display: none; }   /* En tema claro: ocultamos el logo blanco */
[data-theme="light"] .logo-on-dark { display: none; }
[data-theme="light"] .logo-on-light { display: block; }
:root:not([data-theme="light"]) .logo-on-light { display: none; }
:root:not([data-theme="light"]) .logo-on-dark { display: block; }

.nav-list { display: flex; flex-direction: column; gap: 3px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: 10px;
  color: var(--text-dim);
  font-size: 14px; font-weight: 500;
  width: 100%; text-align: left;
  transition: background 0.15s, color 0.15s;
}
.nav-item:hover { background: var(--bg-card); color: var(--text); }
.nav-item.active { background: var(--text); color: var(--bg); font-weight: 600; }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

.sidebar-footer {
  margin-top: auto; padding-top: 20px;
}
.user-pill {
  display: flex; align-items: center; gap: 11px;
  padding: 11px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.user-avatar {
  width: 36px; height: 36px; border-radius: 18px;
  background: var(--text); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter Tight'; font-weight: 700; font-size: 15px;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-email { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

.theme-toggle-app {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 10px 12px;
  margin-bottom: 8px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  transition: color 0.2s var(--ease), background 0.2s var(--ease), border-color 0.2s var(--ease);
}
.theme-toggle-app:hover { color: var(--text); border-color: var(--border-strong); background: var(--bg-card); }
.theme-toggle-app svg { width: 16px; height: 16px; }
.theme-toggle-app .theme-icon-sun { display: none; }
[data-theme="light"] .theme-toggle-app .theme-icon-sun { display: block; }
[data-theme="light"] .theme-toggle-app .theme-icon-moon { display: none; }
.theme-toggle-label { font-weight: 500; }

.theme-toggle-mobile {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  cursor: pointer;
  transition: color 0.2s var(--ease), border-color 0.2s var(--ease);
}
.theme-toggle-mobile:hover, .theme-toggle-mobile:active { color: var(--text); border-color: var(--border-strong); }
.theme-toggle-mobile svg { width: 16px; height: 16px; }
.theme-toggle-mobile .theme-icon-sun { display: none; }
[data-theme="light"] .theme-toggle-mobile .theme-icon-sun { display: block; }
[data-theme="light"] .theme-toggle-mobile .theme-icon-moon { display: none; }

/* Toggle de idioma — mismo patrón que theme-toggle */
.lang-toggle-app {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 10px 12px;
  margin-bottom: 8px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  transition: color 0.2s var(--ease), background 0.2s var(--ease), border-color 0.2s var(--ease);
  font-family: inherit;
}
.lang-toggle-app:hover { color: var(--text); border-color: var(--border-strong); background: var(--bg-card); }
.lang-toggle-app .lang-toggle-code {
  font-weight: 700; font-size: 11px; letter-spacing: 0.5px;
  padding: 2px 6px; border-radius: 4px;
  background: var(--bg-card); border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
}
.lang-toggle-mobile {
  height: 36px; padding: 0 10px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: color 0.2s var(--ease), border-color 0.2s var(--ease);
}
.lang-toggle-mobile:hover, .lang-toggle-mobile:active { color: var(--text); border-color: var(--border-strong); }

/* Mobile top bar + bottom nav */
.mobile-top {
  display: none;
  position: sticky; top: 0; z-index: 50;
  padding: 14px 20px;
  background: color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  align-items: center; justify-content: space-between;
}
.mobile-bottom {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  padding: 8px 8px 16px;
  background: color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter: blur(14px);
  border-top: 1px solid var(--border);
  justify-content: space-around;
}
.mobile-tab {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 12px;
  color: var(--text-dim);
  font-size: 10px; font-weight: 600;
  flex: 1;
  transition: color 0.15s;
}
.mobile-tab.active { color: var(--text); }
.mobile-tab svg { width: 20px; height: 20px; }
@media (max-width: 1023px) {
  .mobile-top { display: flex; }
  .mobile-bottom { display: flex; }
  main { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
  /* El .brand reutiliza el padding del sidebar; aquí dentro de mobile-top
     ese padding-bottom: 28px descentra el logo respecto a los botones. */
  .mobile-top .brand { padding: 0; }
  /* Tap targets — Apple HIG 44px / Material 48dp */
  .lang-toggle-mobile,
  .theme-toggle-mobile { min-height: 44px; min-width: 44px; }
}

/* Main content */
main {
  background: var(--bg);
  min-height: 100vh;
}
.container {
  max-width: 1280px; margin: 0 auto;
  padding: clamp(24px, 4vw, 56px) clamp(20px, 3vw, 48px);
  width: 100%;
}
.container-narrow { max-width: 780px; }

/* ===================== TYPOGRAPHY ===================== */
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1.4px;
  color: var(--text-mute);
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 999px;
  margin-bottom: 20px;
}
.eyebrow::before {
  content: ''; width: 4px; height: 4px; border-radius: 2px;
  background: var(--text-mute);
}
.h1 {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 800; letter-spacing: -0.04em;
  line-height: 1.02;
  color: var(--text);
}
.h2 {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(22px, 2.4vw, 28px);
  font-weight: 700; letter-spacing: -0.02em;
  line-height: 1.1;
}
.h3 {
  font-family: 'Inter Tight', sans-serif;
  font-size: 18px; font-weight: 700; letter-spacing: -0.02em;
}
.text-dim { color: var(--text-dim); }
.text-mute { color: var(--text-mute); }
.mono { font-family: 'JetBrains Mono', monospace; }
.label-up {
  font-size: 11px; color: var(--text-mute);
  text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;
}

/* ===================== BUTTONS ===================== */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 22px; border-radius: 12px;
  font-size: 14px; font-weight: 600;
  transition: all 0.2s var(--ease);
  white-space: nowrap;
}
.btn-primary { background: var(--text); color: var(--bg); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 30px rgba(127,127,127,0.18); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-ghost {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-ghost:hover { background: var(--bg-elev); border-color: var(--border-strong); }
.btn-soft {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-soft:hover { background: var(--bg-elev); border-color: var(--border-strong); }
.btn-danger {
  background: var(--neg-soft); color: var(--neg);
  border: 1px solid rgba(255,71,87,0.2);
}
.btn-success { background: var(--pos); color: #000; }
.btn-large { padding: 16px 28px; font-size: 15px; border-radius: 14px; }
.btn-arrow { transition: transform 0.2s var(--ease); }
.btn:hover .btn-arrow { transform: translateX(3px); }

/* ===================== CARDS ===================== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px;
  transition: border-color 0.2s, transform 0.2s var(--ease), background 0.2s;
}
.card-hover:hover {
  transform: translateY(-3px);
  border-color: var(--border-strong);
  background: var(--bg-elev);
}
.card-pad-lg { padding: 32px; }

/* ===================== FORMS ===================== */
.input {
  width: 100%; height: 52px;
  padding: 0 18px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 15px; font-weight: 500;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
/* iOS Safari hace auto-zoom en cualquier input con font-size < 16px al
   focusear. Forzamos 16px en mobile para evitar el zoom + layout shift. */
@media (max-width: 1023px) {
  .input { font-size: 16px; }
}
.input:focus {
  border-color: var(--text-mute);
  background: var(--bg-elev);
}
.input-with-icon { padding-left: 46px; }
.input-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--text-mute);
  pointer-events: none;
}
.input-wrap { position: relative; }

.field-label {
  display: block;
  font-size: 11px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1.2px;
  font-weight: 600;
  margin-bottom: 10px;
}

/* ===================== AUTH SCREEN ===================== */
.auth-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.auth-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.03), transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(255,255,255,0.03), transparent 60%);
  pointer-events: none;
}
.auth-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 75%);
  pointer-events: none;
}
.auth-card {
  position: relative; z-index: 1;
  width: 100%; max-width: 440px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 44px 36px;
}
/* Versión div: usada con un SVG icono contextual dentro (mail, lock, etc.) */
.auth-logo {
  width: 56px; height: 56px; border-radius: 14px;
  background: var(--text); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
}
/* Wrap del logo de marca en pantallas auth — ya no necesita fondo (los SVGs lo traen) */
.auth-logo-img-wrap {
  width: 56px; height: 56px;
  background: transparent;
  border-radius: 0;
  display: block;
  margin: 0 auto 24px;
  line-height: 0;
}
.auth-logo-img-wrap img { width: 56px; height: 56px; object-fit: contain; }
.auth-card h1 {
  text-align: center;
  font-family: 'Inter Tight', sans-serif;
  font-size: 30px; font-weight: 800; letter-spacing: -0.03em;
  margin-bottom: 8px;
}
.auth-card .sub {
  text-align: center;
  font-size: 14px; color: var(--text-dim);
  margin-bottom: 32px;
}
.auth-form {
  display: flex; flex-direction: column; gap: 12px;
}
.auth-toggle {
  text-align: center; margin-top: 22px;
  font-size: 14px; color: var(--text-dim);
}
.auth-toggle button {
  color: var(--text); font-weight: 600; padding-left: 4px;
}
.auth-error {
  background: var(--neg-soft); color: var(--neg);
  border: 1px solid rgba(255,71,87,0.2);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 13px;
  display: flex; align-items: center; gap: 8px;
}
.auth-error svg { width: 16px; height: 16px; flex-shrink: 0; }
.auth-info {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px;
  background: var(--pos-soft); color: var(--pos);
  border: 1px solid rgba(0,209,122,0.22);
  border-radius: 10px;
  font-size: 13px; font-weight: 500;
}
.auth-info svg { width: 16px; height: 16px; flex-shrink: 0; }
.visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

.input-with-action { padding-right: 46px; }
.input-action {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; cursor: pointer;
  color: var(--text-mute);
  border-radius: 8px;
  transition: color 0.15s, background 0.15s;
}
.input-action:hover { color: var(--text); background: var(--bg-elev); }
.input-action svg { width: 18px; height: 18px; }

.pw-bar {
  height: 4px; border-radius: 4px; background: var(--border);
  margin: 4px 0 8px; overflow: hidden;
}
.pw-bar-fill {
  height: 100%; width: 0%; border-radius: 4px;
  background: var(--neg);
  transition: width 0.25s var(--ease), background 0.25s;
}
.pw-bar-fill.s2 { background: #FFB020; }
.pw-bar-fill.s3 { background: #FFB020; }
.pw-bar-fill.s4 { background: var(--pos); }
.pw-rules {
  display: flex; flex-wrap: wrap; gap: 6px 14px;
  font-size: 11.5px; color: var(--text-mute);
  margin-bottom: 4px;
}
.pw-rule { display: inline-flex; align-items: center; gap: 5px; transition: color 0.2s; }
.pw-rule svg { width: 6px; height: 6px; transition: color 0.2s; }
.pw-rule.ok { color: var(--pos); }

.terms-row {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 12.5px; color: var(--text-dim); line-height: 1.4;
  cursor: pointer;
  margin: 4px 0;
}
.terms-row input[type="checkbox"] {
  margin-top: 2px;
  accent-color: var(--text);
  width: 16px; height: 16px;
  flex-shrink: 0;
  cursor: pointer;
}
.terms-row a { color: var(--text); text-decoration: underline; }

.auth-link-sub {
  background: transparent; border: none; cursor: pointer;

}

}
.wizard-title {

.option-grid {

@media (max-width: 600px) { .tf-grid { grid-template-columns: repeat(4, 1fr); } }
.option-card {

/* ===================== POLISH ===================== */
/* Press feedback en botones — feedback táctil sin cambiar layout */
.btn:active:not(:disabled) { transform: translateY(1px) scale(0.985); transition-duration: 0.08s; }
.btn-primary:active:not(:disabled) { box-shadow: 0 4px 12px rgba(127,127,127,0.12); }

/* Card depth sutil cuando ya están en hover (sólo .card-hover) */
.card-hover { box-shadow: 0 1px 0 rgba(0,0,0,0.02); }
.card-hover:hover { box-shadow: 0 14px 38px rgba(0,0,0,0.12), 0 0 1px rgba(255,255,255,0.04); }
:root[data-theme="light"] .card-hover:hover { box-shadow: 0 14px 30px rgba(0,0,0,0.06); }

/* Skeleton shimmer — usar .skeleton para bloques de carga */

  .skeleton { animation: none; }

<div id="root"></div>

<div id="toast-root"></div>

<!-- Catálogo bilingüe ES/EN compartido. Define window.t() y window.tResp()
     que api() usa para traducir el `code` que devuelve el backend. -->
<script src="/i18n.js"></script>

<script>
// =====================================================
//  LANGUAGE REDIRECT (Spanish app)
// =====================================================
// Si el usuario eligió inglés explícitamente desde el landing o desde el
// toggle del propio app, le mandamos a la versión inglesa /en/app. Solo
// redirigimos UNA vez al cargar para no entrar en loop con app-en.html.
(() => {
  try {
    const chosen = localStorage.getItem('lang');
    if (chosen === 'en' && !window.location.pathname.startsWith('/en/')) {
      // Preserva query y hash al saltar al app inglés
      window.location.replace('/en/app' + window.location.search + window.location.hash);
    }
  } catch (e) {}
})();

// =====================================================
//  STATE & CONFIG
// =====================================================
const BACKEND_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:5000'
  : 'https://algotrade-backend-production-5f1f.up.railway.app';
const API = BACKEND_URL + '/api';
// IMPORTANTE: window.APP_LANG (no const). i18n.js lee window.APP_LANG para
// elegir idioma de los códigos del backend; un const block-scoped no se
// publica al objeto global y la traducción cae siempre al fallback ES.
window.APP_LANG = 'es';
const APP_LANG = window.APP_LANG;

const state = {
  user: null,
  token: null,
  bots: [],
  currentScreen: 'auth',     // auth | dashboard | wizard | bot | guide | account | support
  selectedBotId: null,
  authMode: 'login',          // login | signup | forgot
  authError: null,
  authInfo: null,             // mensaje informativo (no error)
  authLoading: false,
  // Login con MFA: tras pasar email+password, guardamos pendingToken aquí y mostramos pantalla OTP
  loginPending: null,         // { pendingToken, emailHint } | null
  // Reset de contraseña vía URL: { userId, token } detectados al cargar
  resetContext: null,
  wizard: {
    step: 0,
    generating: false,
    generationDone: false,
    checkoutTriggered: false,
    data: {
      name: 'Mi Bot Pro',
      avatar: 'classic',
      market: 'forex',
      pair: 'EUR/USD',
      strategy: 'scalping',
      leverage: 30,
      indicators: ['rsi', 'ema'],
      timeframe: 'M15', // M1 / M5 / M15 / M30 / H1 / H4 / D1
      lot: { mode: 'auto', fixedLot: 0.10 }, // mode: 'auto' (riesgo %) o 'fixed' (lote fijo)
      risk: { unit: 'percent', stopLoss: 1.5, takeProfit: 3.0, posSize: 2, dailyLoss: 4 },
      news: {
        enabled: true,
        beforeMin: 30,
        afterMin: 15,
        impactMin: 'high',
        // Por defecto todos los eventos comunes seleccionados (= comportamiento anterior)
        events: ['nfp','fomc','cpi-us','powell','gdp-us','retail-us','unemp-us','ism-us','ecb-rate','ecb-press','cpi-eu','gdp-eu','pmi-eu','boe-rate','cpi-uk','gdp-uk','boj-rate'],
      },
      funded: { enabled: false, firm: null },
    },
  },
};

// =====================================================
//  PERSISTENCE
// =====================================================
function loadAuth() {
  // Solo cargar si no hay sesión ya iniciada (evita reset en cada render)
  if (state.token) return;
  try {
    const t = localStorage.getItem('token');
    const u = localStorage.getItem('user');
    if (t && u) {
      state.token = t;
      state.user = JSON.parse(u);
      state.currentScreen = 'dashboard';
    }
  } catch (e) {}
}
function saveAuth(token, user) {
  // Safari iOS Privado lanza QuotaExceededError al hacer setItem. Sin try/catch
  // el login se aborta sin feedback. El estado en memoria sigue siendo válido,
  // solo perdemos la persistencia entre recargas.
  try {
    localStorage.setItem('token', token);
    localStorage.setItem('user', JSON.stringify(user));
  } catch (_) {}
  state.token = token;
  state.user = user;
}
function clearAuth() {
  try {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
  } catch (_) {}
  state.token = null;
  state.user = null;
  state.bots = [];
}

// =====================================================
//  API HELPERS
// =====================================================
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const res = await fetch(`${API}${path}`, { ...opts, headers });
  const data = await res.json().catch(() => ({}));
  // Localiza la respuesta usando tResp() del catálogo bilingüe (i18n.js).
  // Si el `code` no existe o el catálogo no está cargado, cae al `error`
  // literal en inglés que mete el backend. Mejor inglés que pantalla rota.
  const localized = (typeof window.tResp === 'function') ? window.tResp(data) : null;
  if (res.status === 401 || res.status === 403) {
    // Token caducado o inválido (típico tras un cambio de JWT_SECRET): cerramos
    // sesión y mandamos al login en lugar de mostrar dashboard vacío.
    if (state.token) {
      clearAuth();
      state.currentScreen = 'auth';
      toast(localized || 'Tu sesión ha caducado. Inicia sesión de nuevo.', 'error');
      render();
    }
    throw new Error(localized || data.error || 'Sesión expirada');
  }
  if (!res.ok) throw new Error(localized || data.error || 'Error');
  return data;
}

// =====================================================
//  ESCAPE — defensa XSS para innerHTML con datos de usuario
// =====================================================
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
const _esc = escapeHtml;

// =====================================================
//  TOAST
// =====================================================
function toast(msg, type = '') {
  const root = document.getElementById('toast-root');
  const wrap = document.createElement('div');
  wrap.className = 'toast-wrap';
  // type es una clase (interna, no user-controlled), msg sí puede serlo
  wrap.innerHTML = `<div class="toast ${type}">${escapeHtml(msg)}</div>`;
  root.appendChild(wrap);
  setTimeout(() => wrap.remove(), 3500);
}

function render() {
  const root = document.getElementById('root');

  if (state.resetContext) {
    root.innerHTML = renderResetPassword();
    bindResetPassword();
    return;
  }
  if (!state.token) {
    // Login con MFA pendiente: mostramos la pantalla del código en vez del formulario
    if (state.loginPending) {
      root.innerHTML = renderLoginMFA();
      bindLoginMFA();
      return;
    }
    if (state.authMode === 'forgot') {
      root.innerHTML = renderForgot();
      bindForgot();
      return;
    }
    root.innerHTML = renderAuth();
    bindAuth();
    return;
  }
  // App shell con sidebar
  if (state.currentScreen === 'wizard') {
    root.innerHTML = renderWizard();
    bindWizard();
    return;
  }
  root.innerHTML = renderShell();
  bindNav();
  // Cargar contenido según pantalla
  loadCurrentScreen();
}

function bindNav() {
  document.querySelectorAll('[data-screen]').forEach(el => {
    el.addEventListener('click', () => {
      state.currentScreen = el.dataset.screen;
      if (state.currentScreen === 'wizard') {
        state.wizard.step = 0;
        state.wizard.generating = false;
        state.wizard.generationDone = false;
        state.wizard.checkoutTriggered = false;
      }
      render();
    });
  });
  document.querySelectorAll('.theme-toggle-trigger').forEach(btn => {
    btn.addEventListener('click', () => {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
      }
    });
  });
  document.querySelectorAll('.lang-toggle-trigger').forEach(btn => {
    btn.addEventListener('click', () => {
      try { localStorage.setItem('lang', 'en'); } catch (e) {}
      window.location.href = '/en/app' + window.location.search + window.location.hash;
    });
  });
}

function bindForgot() {

      // El backend siempre responde 200 con SAFE_OK, pero por si acaso
      state.authError = err.message || 'Error al enviar el enlace';
      state.authLoading = false;
      render();
    }
  });
}

function bindResetPassword() {
  const pwInput = document.getElementById('reset-pw');
  const togglePw = document.getElementById('reset-toggle-pw');
  togglePw?.addEventListener('click', () => {
    if (!pwInput) return;
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    togglePw.innerHTML = isHidden ? I.eyeOff : I.eye;
  });

  // Medidor de fuerza
  const strengthBox = document.getElementById('reset-pw-strength');
  const fill = document.getElementById('reset-pw-bar-fill');
  const rLen = document.getElementById('reset-r-len');
  const rUpper = document.getElementById('reset-r-upper');
  const rNum = document.getElementById('reset-r-num');
  pwInput?.addEventListener('input', () => {
    const v = pwInput.value || '';
    if (strengthBox) strengthBox.style.display = v.length > 0 ? '' : 'none';
    const okLen = v.length >= 8;
    const okUpper = /[A-Z]/.test(v);
    const okNum = /\d/.test(v);
    rLen?.classList.toggle('ok', okLen);
    rUpper?.classList.toggle('ok', okUpper);
    rNum?.classList.toggle('ok', okNum);
    const score = (okLen ? 1 : 0) + (okUpper ? 1 : 0) + (okNum ? 1 : 0) + (v.length >= 12 ? 1 : 0);
    if (fill) {
      fill.style.width = (score / 4) * 100 + '%';
      fill.className = 'pw-bar-fill s' + Math.max(1, score);
    }
  });

  document.getElementById('reset-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const newPassword = pwInput.value;
    const confirm = document.getElementById('reset-pw2').value;
    if (newPassword !== confirm) { state.authError = 'Las contraseñas no coinciden'; render(); return; }
    if (newPassword.length < 8 || !/[A-Z]/.test(newPassword) || !/\d/.test(newPassword)) {
      state.authError = 'La contraseña necesita 8+ chars, mayúscula y número';
      render();
      return;
    }
    state.authError = null;
    state.authLoading = true;
    render();
    try {
      await api('/auth/reset-password', {
        method: 'POST',
        body: JSON.stringify({
          userId: state.resetContext.userId,
          token: state.resetContext.token,
          newPassword,
        }),
      });
      // Limpiar URL, salir del modo reset, ir al login
      try { window.history.replaceState({}, '', '/app'); } catch (_) {}
      clearAuth();
      state.resetContext = null;
      state.authMode = 'login';
      state.authError = null;
      state.authLoading = false;
      toast('Contraseña restablecida. Inicia sesión con la nueva.', 'success');
      render();
    } catch (err) {
      state.authError = err.message || 'No se pudo restablecer';
      state.authLoading = false;
      render();
    }
  });
}

function bindLoginMFA() {
  const inputs = document.querySelectorAll('.otp-input');
  inputs[0]?.focus();
  inputs.forEach((el, i) => {
    el.addEventListener('input', (e) => {
      const v = (e.target.value || '').replace(/\D/g, '').slice(0, 1);
      e.target.value = v;
      if (v && inputs[i + 1]) inputs[i + 1].focus();
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && inputs[i - 1]) {
        inputs[i - 1].focus();
      }
    });
    el.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData?.getData('text') || '').replace(/\D/g, '').slice(0, 6);
      [...text].forEach((ch, idx) => { if (inputs[idx]) inputs[idx].value = ch; });
      if (text.length === 6) inputs[5]?.focus();
    });
  });

  document.getElementById('mfa-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = [...inputs].map(x => x.value).join('');
    if (!/^\d{6}$/.test(code)) {
      state.authError = 'Introduce los 6 dígitos del código';
      render();
      return;
    }
    state.authError = null;
    state.authLoading = true;
    render();
    try {
      const data = await api('/auth/verify-login', {
        method: 'POST',
        body: JSON.stringify({
          pendingToken: state.loginPending.pendingToken,
          code,
        }),
      });
      if (data.token) {
        saveAuth(data.token, data.user);
        state.loginPending = null;
        state.currentScreen = 'dashboard';
        state.authLoading = false;
        toast(`¡Hola ${data.user?.name?.split(' ')[0] || ''}!`, 'success');
        render();
      }
    } catch (err) {
      state.authError = err.message || 'Código incorrecto';
      state.authLoading = false;
      render();
    }
  });

  document.getElementById('resend-code')?.addEventListener('click', async () => {
    try {
      await api('/auth/resend-login-code', {
        method: 'POST',
        body: JSON.stringify({ pendingToken: state.loginPending.pendingToken }),
      });
      toast('Código reenviado. Revisa tu email.', 'success');
    } catch (err) {
      toast(err.message || 'No se pudo reenviar', 'error');
    }
  });

  document.getElementById('back-to-login')?.addEventListener('click', () => {
    state.loginPending = null;
    state.authError = null;
    render();
  });
}

function bindAuth() {
  const isLogin = state.authMode === 'login';

  document.getElementById('toggle-mode')?.addEventListener('click', () => {
    state.authMode = state.authMode === 'login' ? 'signup' : 'login';
    state.authError = null;
    render();
  });

  // Mostrar/ocultar contraseña
  const pwInput = document.getElementById('password');
  const togglePw = document.getElementById('toggle-pw');
  togglePw?.addEventListener('click', () => {
    if (!pwInput) return;
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    togglePw.innerHTML = isHidden ? I.eyeOff : I.eye;
    togglePw.setAttribute('aria-label', isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña');
  });

  // Medidor de fuerza de contraseña (solo en signup)
  if (!isLogin) {
    const strengthBox = document.getElementById('pw-strength');
    const fill = document.getElementById('pw-bar-fill');
    const rLen = document.getElementById('pw-r-len');
    const rUpper = document.getElementById('pw-r-upper');
    const rNum = document.getElementById('pw-r-num');
    const updateStrength = () => {
      const v = pwInput.value || '';
      strengthBox.style.display = v.length > 0 ? '' : 'none';
      const okLen = v.length >= 8;
      const okUpper = /[A-Z]/.test(v);
      const okNum = /\d/.test(v);
      rLen?.classList.toggle('ok', okLen);
      rUpper?.classList.toggle('ok', okUpper);
      rNum?.classList.toggle('ok', okNum);
      const score = (okLen ? 1 : 0) + (okUpper ? 1 : 0) + (okNum ? 1 : 0) + (v.length >= 12 ? 1 : 0);
      const pct = (score / 4) * 100;
      if (fill) {
        fill.style.width = pct + '%';
        fill.className = 'pw-bar-fill s' + Math.max(1, score);
      }
    };
    pwInput?.addEventListener('input', updateStrength);

  } else {
    document.getElementById('forgot-pw')?.addEventListener('click', () => {
      state.authMode = 'forgot';
      state.authError = null;
      state.authInfo = null;
      render();
    });
  }

  document.getElementById('auth-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const isSignup = state.authMode === 'signup';

    // Validación cliente
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      state.authError = 'Email no válido'; render(); return;
    }
    if (isSignup) {
      const name = document.getElementById('name')?.value.trim() || '';
      const password2 = document.getElementById('password2')?.value || '';
      const terms = document.getElementById('terms')?.checked;
      if (name.length < 2) { state.authError = 'Pon tu nombre completo'; render(); return; }
      if (password.length < 8) { state.authError = 'La contraseña debe tener al menos 8 caracteres'; render(); return; }
      if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/\d/.test(password)) {
        state.authError = 'La contraseña necesita al menos una mayúscula, una minúscula y un número'; render(); return;
      }
      if (password !== password2) { state.authError = 'Las contraseñas no coinciden'; render(); return; }
      if (!terms) { state.authError = 'Debes aceptar los términos para crear la cuenta'; render(); return; }

      state.authError = null;
      state.authLoading = true;
      render();
      try {
        await api('/auth/signup', { method: 'POST', body: JSON.stringify({ email, password, name, lang: APP_LANG }) });
        // Cuenta creada — mandamos al usuario al formulario de login con un mensaje
        state.authMode = 'login';
        state.authError = null;
        state.authLoading = false;
        toast('Cuenta creada. Te hemos enviado un email de bienvenida. Inicia sesión para verificar tu email.', 'success');
        render();
      } catch (err) {
        state.authError = err.message || 'Error de autenticación';
        state.authLoading = false;
        render();
      }
      return;
    }

    // Login
    if (password.length < 6) { state.authError = 'Contraseña requerida'; render(); return; }
    state.authError = null;
    state.authLoading = true;
    render();
    try {
      const data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      if (data.requiresMFA && data.pendingToken) {
        // Email + contraseña OK. Toca pantalla del código.
        state.loginPending = { pendingToken: data.pendingToken, emailHint: data.emailHint || email };
        state.authLoading = false;
        state.authError = null;
        render();
        return;
      }
      // Fallback (login sin MFA, no debería pasar)
      if (data.token) {
        saveAuth(data.token, data.user);
        state.currentScreen = 'dashboard';
        state.authLoading = false;
        render();
      }
    } catch (err) {
      state.authError = err.message || 'Error de autenticación';
      state.authLoading = false;
      render();
    }
  });
}

let _lastWizardStep = -1;
function renderWizard() {
  const w = state.wizard;
  const cur = WIZARD_STEPS[w.step];
  const isLast = w.step === WIZARD_STEPS.length - 1;
  const isGenerate = w.step === 5;
  const stepChanged = _lastWizardStep !== w.step;
  _lastWizardStep = w.step;
  const fadeUp = stepChanged ? 'fade-up' : '';
  const fadeIn = stepChanged ? 'fade-in' : '';

  return `
    <div class="wizard ${fadeIn}">
      <div class="wizard-header">
        <div class="wizard-header-inner">
          <div class="wizard-top-row">
            <button class="wizard-back" id="wizard-prev" ${w.generating ? 'disabled' : ''}>
              ${w.step === 0 ? I.close : I.arrowLeft}
              <span>${w.step === 0 ? 'Cerrar' : 'Atrás'}</span>
            </button>
            <div class="wizard-counter">${String(w.step + 1).padStart(2, '0')} / ${String(WIZARD_STEPS.length).padStart(2, '0')}</div>
          </div>
          <div class="wizard-progress">
            ${WIZARD_STEPS.map((_, i) => `<div class="wizard-progress-bar ${i <= w.step ? 'done' : ''}"></div>`).join('')}
          </div>
        </div>
      </div>
      <div class="wizard-body">
        <div class="wizard-body-inner">
          <h1 class="wizard-title ${fadeUp}">${cur.title}</h1>
          <p class="wizard-subtitle ${fadeUp}">${cur.subtitle}</p>
          <div class="${fadeUp}" style="${stepChanged ? 'animation-delay: 0.1s' : ''}">${renderWizardStep(w.step)}</div>
        </div>
      </div>
      <div class="wizard-footer">
        <div class="wizard-footer-inner">
          ${isGenerate ? renderGenerateCTA() : renderWizardCTA(isLast)}
        </div>
      </div>
    </div>
  `;
}

function renderWizardCTA(isLast) {
  return `
    <button class="btn btn-primary wizard-cta" id="wizard-next">
      <span>${isLast ? `Pagar €9.99` : 'Continuar'}</span>
      <span class="btn-arrow">→</span>
    </button>
    ${isLast ? '<div class="text-center text-mute mt-2" style="font-size:11px;margin-top:10px">✓ Pago único · Sin suscripciones · El bot es tuyo para siempre</div>' : ''}
  `;
}

function renderGenerateCTA() {
  const w = state.wizard;
  if (w.generationDone) {
    return `
      <button class="btn btn-primary wizard-cta" id="wizard-next">
        <span>Ver resumen</span>
        <span class="btn-arrow">→</span>
      </button>
    `;
  }
  return `
    <button class="btn wizard-cta" disabled>
      <span class="spinner"></span>
      <span>Generando bot...</span>
    </button>
  `;
}

function renderWizardStep(step) {
  if (step === 0) return renderStepName();
  if (step === 1) return renderStepStrategy();
  if (step === 2) return renderStepIndicators();
  if (step === 3) return renderStepRisk();
  if (step === 4) return renderStepFunded();
  if (step === 5) return renderStepGenerate();
  if (step === 6) return renderStepReview();
  if (step === 7) return renderStepPay();
  return '';
}

function rrFeedback(ratio) {
  if (ratio >= 3)   return { msg: 'Excelente — basta con un 25% de aciertos para ser rentable', tone: 'pos' };
  if (ratio >= 2)   return { msg: 'Bueno — basta con un 33% de aciertos para ser rentable', tone: 'pos' };
  if (ratio >= 1.5) return { msg: 'Aceptable — necesitas más de 40% de aciertos', tone: 'warn' };
  if (ratio >= 1)   return { msg: 'Justo — necesitas más del 50% de aciertos', tone: 'warn' };
  return            { msg: 'Arriesgado — el take profit es menor que el stop loss', tone: 'neg' };
}

function applyRRFeedback() {
  const card = document.getElementById('rr-card');
  const lbl = document.getElementById('lbl-rr');
  const hint = document.getElementById('lbl-rr-hint');
  if (!card || !lbl || !hint) return;
  const w = state.wizard.data.risk;
  const ratio = w.takeProfit / w.stopLoss;
  const fb = rrFeedback(ratio);
  lbl.textContent = `Ratio R:R = 1:${ratio.toFixed(1)}`;
  hint.textContent = fb.msg;
  const colors = {
    pos:  { bg: 'rgba(0,209,122,0.08)',  bd: 'rgba(0,209,122,0.22)',  fg: 'var(--pos)' },
    warn: { bg: 'rgba(255,176,32,0.08)', bd: 'rgba(255,176,32,0.22)', fg: '#FFB020' },
    neg:  { bg: 'rgba(255,71,87,0.08)',  bd: 'rgba(255,71,87,0.22)',  fg: 'var(--neg)' },
  }[fb.tone];
  card.style.background = colors.bg;
  card.style.borderColor = colors.bd;
  lbl.style.color = colors.fg;
}

function bindWizard() {
  const w = state.wizard;
  document.getElementById('wizard-prev')?.addEventListener('click', () => {
    if (w.generating) return;
    if (w.step === 0) {
      state.currentScreen = 'dashboard';
      render();
    } else {
      w.step--;
      render();
    }
  });
  document.getElementById('wizard-next')?.addEventListener('click', () => {
    handleWizardNext();
  });

  // Step 0: Name
  document.getElementById('bot-name')?.addEventListener('input', (e) => { w.data.name = e.target.value; });
  document.querySelectorAll('[data-market]').forEach(el => {
    el.addEventListener('click', () => {
      const m = MARKETS.find(x => x.id === el.dataset.market);
      w.data.market = m.id;
      w.data.pair = m.pairs[0];
      render();
    });
  });
  document.querySelectorAll('[data-pair]').forEach(el => {
    el.addEventListener('click', () => { w.data.pair = el.dataset.pair; render(); });
  });
  document.querySelectorAll('[data-avatar]').forEach(el => {
    el.addEventListener('click', () => { w.data.avatar = el.dataset.avatar; render(); });
  });

  // Step 1: Strategy
  document.querySelectorAll('[data-strategy]').forEach(el => {
    el.addEventListener('click', () => { w.data.strategy = el.dataset.strategy; render(); });
  });

  // Step 2: Indicators
  document.querySelectorAll('[data-indicator]').forEach(el => {
    el.addEventListener('click', () => {
      // Bloqueamos los indicadores marcados como no disponibles para que el
      // usuario no termine con un bot que no analiza lo que cree analizar.
      if (el.dataset.available === 'false' || el.disabled) {
        toast('Este indicador estará disponible próximamente. Por ahora elige RSI, EMA, MACD o Bollinger.', 'info');
        return;
      }
      const id = el.dataset.indicator;
      const idx = w.data.indicators.indexOf(id);
      if (idx >= 0) w.data.indicators.splice(idx, 1);
      else w.data.indicators.push(id);
      render();
    });
  });

  // Step 3: Risk
  // Timeframe selection
  document.querySelectorAll('[data-timeframe]').forEach(el => {
    el.addEventListener('click', () => { w.data.timeframe = el.dataset.timeframe; render(); });
  });
  // Lot mode (auto / fixed)
  document.querySelectorAll('[data-lotmode]').forEach(el => {
    el.addEventListener('click', () => {
      if (!w.data.lot) w.data.lot = { mode: 'auto', fixedLot: 0.10 };
      w.data.lot.mode = el.dataset.lotmode;
      render();
    });
  });
  // Fixed lot presets
  document.querySelectorAll('[data-fixedlot]').forEach(el => {
    el.addEventListener('click', () => {
      if (!w.data.lot) w.data.lot = { mode: 'fixed', fixedLot: 0.10 };
      w.data.lot.fixedLot = parseFloat(el.dataset.fixedlot);
      render();
    });
  });
  // Custom lot input
  document.getElementById('lot-custom')?.addEventListener('input', (e) => {
    if (!w.data.lot) w.data.lot = { mode: 'fixed', fixedLot: 0.10 };
    const v = parseFloat(e.target.value);
    if (isFinite(v)) w.data.lot.fixedLot = Math.max(0.01, Math.min(100, v));
  });
  document.getElementById('lot-custom')?.addEventListener('change', () => render());

  document.querySelectorAll('[data-leverage]').forEach(el => {
    el.addEventListener('click', () => { w.data.leverage = parseInt(el.dataset.leverage); render(); });
  });
  document.getElementById('leverage-custom')?.addEventListener('input', (e) => {
    const val = Math.max(1, Math.min(2000, parseInt(e.target.value) || 1));
    w.data.leverage = val;
  });
  document.getElementById('leverage-custom')?.addEventListener('change', () => render());
  const sliderMap = { sl: 'stopLoss', tp: 'takeProfit', ps: 'posSize', dl: 'dailyLoss' };
  const unitSuffix = w.data.risk.unit === 'percent' ? '%' : w.data.risk.unit === 'pips' ? ' pips' : '× ATR';
  const sliderLabels = {
    sl: (v) => `Stop loss · ${v}${unitSuffix}`,
    tp: (v) => `Take profit · ${v}${unitSuffix}`,
    ps: (v) => `Tamaño posición · ${v}% del capital`,
    dl: (v) => `Pérdida diaria máxima · ${v}%`,
  };
  // Toggle de unidad SL/TP. Al cambiar resetea SL/TP a un valor sensato
  // para esa unidad (15 pips, 1.5×ATR, 1.5%) — si no, dejar el valor viejo
  // produciría inputs absurdos (e.g. 1.5 pips o 15× ATR).
  document.querySelectorAll('[data-risk-unit]').forEach(btn => {
    btn.addEventListener('click', () => {
      const unit = btn.getAttribute('data-risk-unit');
      if (unit === w.data.risk.unit) return;
      w.data.risk.unit = unit;
      const defaults = { percent: { sl: 1.5, tp: 3.0 }, pips: { sl: 15, tp: 30 }, atr: { sl: 1.5, tp: 3.0 } };
      w.data.risk.stopLoss = defaults[unit].sl;
      w.data.risk.takeProfit = defaults[unit].tp;
      render();
    });
  });
  const updateSliderFill = (el) => {
    const min = parseFloat(el.min), max = parseFloat(el.max), val = parseFloat(el.value);
    el.style.setProperty('--val', ((val - min) / (max - min)) * 100 + '%');
  };
  ['sl','tp','ps','dl'].forEach(k => {
    const el = document.getElementById('r-' + k);
    if (!el) return;
    updateSliderFill(el);
    el.addEventListener('input', (e) => {
      const v = parseFloat(e.target.value);
      w.data.risk[sliderMap[k]] = v;
      updateSliderFill(el);
      const lbl = document.getElementById('lbl-' + k);
      if (lbl) lbl.textContent = sliderLabels[k](v);
      applyRRFeedback();
    });
  });
  applyRRFeedback();

  // Step 3: News filter
  document.getElementById('toggle-news')?.addEventListener('click', () => {
    w.data.news.enabled = !w.data.news.enabled;
    render();
  });
  document.getElementById('toggle-be')?.addEventListener('click', () => {
    w.data.risk.breakEven = w.data.risk.breakEven || { enabled: false };
    w.data.risk.breakEven.enabled = !w.data.risk.breakEven.enabled;
    if (w.data.risk.breakEven.enabled && w.data.risk.breakEven.triggerDistance == null) {
      w.data.risk.breakEven.triggerDistance = w.data.risk.unit === 'pips' ? 10 : 1.0;
    }
    render();
  });
  document.getElementById('toggle-trail')?.addEventListener('click', () => {
    w.data.risk.trailing = w.data.risk.trailing || { enabled: false };
    w.data.risk.trailing.enabled = !w.data.risk.trailing.enabled;
    if (w.data.risk.trailing.enabled && w.data.risk.trailing.distance == null) {
      w.data.risk.trailing.distance = w.data.risk.unit === 'pips' ? 10 : 1.0;
    }
    render();
  });
  // Sliders de BE / trailing — solo existen cuando los toggles están on
  ['be','trail'].forEach(k => {
    const el = document.getElementById('r-' + k);
    if (!el) return;
    const min = parseFloat(el.min), max = parseFloat(el.max);
    el.style.setProperty('--val', ((parseFloat(el.value) - min) / (max - min)) * 100 + '%');
    el.addEventListener('input', (e) => {
      const v = parseFloat(e.target.value);
      const suf = w.data.risk.unit === 'percent' ? '%' : w.data.risk.unit === 'pips' ? ' pips' : '× ATR';
      if (k === 'be') { w.data.risk.breakEven.triggerDistance = v; document.getElementById('lbl-be').textContent = `Activar cuando profit ≥ ${v}${suf}`; }
      if (k === 'trail') { w.data.risk.trailing.distance = v; document.getElementById('lbl-trail').textContent = `Distancia · ${v}${suf}`; }
      el.style.setProperty('--val', ((v - min) / (max - min)) * 100 + '%');
    });
  });
  document.querySelectorAll('[data-news-impact]').forEach(el => {
    el.addEventListener('click', () => { w.data.news.impactMin = el.dataset.newsImpact; render(); });
  });
  ['newsbef', 'newsaft'].forEach(k => {
    const el = document.getElementById('r-' + k);
    if (!el) return;
    updateSliderFill(el);
    el.addEventListener('input', (e) => {
      const v = parseInt(e.target.value, 10);
      if (k === 'newsbef') w.data.news.beforeMin = v;
      else w.data.news.afterMin = v;
      updateSliderFill(el);
      const lbl = document.getElementById('lbl-' + k);
      if (lbl) lbl.textContent = (k === 'newsbef' ? 'Pausar antes de la noticia · ' : 'Reanudar después de la noticia · ') + v + ' min';
    });
  });
  document.querySelectorAll('[data-news-event]').forEach(el => {
    el.addEventListener('click', (ev) => {
      ev.preventDefault();
      const id = el.dataset.newsEvent;
      const idx = w.data.news.events.indexOf(id);
      if (idx >= 0) w.data.news.events.splice(idx, 1);
      else w.data.news.events.push(id);
      el.classList.toggle('selected');
    });
  });
  document.getElementById('news-events-all')?.addEventListener('click', (ev) => {
    ev.preventDefault();
    w.data.news.events = NEWS_EVENTS.map(e => e.id);
    render();
  });
  document.getElementById('news-events-none')?.addEventListener('click', (ev) => {
    ev.preventDefault();
    w.data.news.events = [];
    render();
  });

  // Step 4: Funded
  document.getElementById('toggle-funded')?.addEventListener('click', () => {
    w.data.funded.enabled = !w.data.funded.enabled;
    if (!w.data.funded.enabled) w.data.funded.firm = null;
    render();
  });
  document.querySelectorAll('[data-firm]').forEach(el => {
    el.addEventListener('click', () => { w.data.funded.firm = el.dataset.firm; render(); });
  });

  // Step 5: Generate (autorun on enter)
  if (w.step === 5 && !w.generating && !w.generationDone) {
    runGeneration();
  }

  // Step 7: Pay (autorun checkout on enter)
  if (w.step === 7 && !w.checkoutTriggered) {
    w.checkoutTriggered = true;
    setTimeout(() => startCheckout(), 600);
  }
}

function validateWizardStep(step) {
  const d = state.wizard.data;
  if (step === 0) {
    if (!d.name || !d.name.trim()) return 'Pon un nombre a tu bot';
    if (d.name.length > 60) return 'El nombre es demasiado largo (máx. 60)';
    if (!d.market || !d.pair) return 'Elige un mercado y un par';
  }
  if (step === 1 && !d.strategy) return 'Elige una estrategia';
  if (step === 2 && (!d.indicators || d.indicators.length === 0)) return 'Selecciona al menos un indicador';
  if (step === 4 && d.funded.enabled && !d.funded.firm) return 'Selecciona tu prop firm o desactiva la cuenta de fondeo';
  return null;
}

function handleWizardNext() {
  const w = state.wizard;
  const err = validateWizardStep(w.step);
  if (err) { toast(err, 'error'); return; }
  if (w.step === WIZARD_STEPS.length - 1) {
    return startCheckout();
  }
  w.step++;
  render();
}

async function runGeneration() {
  const w = state.wizard;
  w.generating = true;
  const durations = [800, 1200, 1500, 2000, 1500, 1000, 1500, 800];
  const phaseRows = document.querySelectorAll('.phase-row');

  for (let i = 0; i < phaseRows.length; i++) {
    const row = phaseRows[i];
    if (!row) continue;
    row.style.opacity = '1';
    const dot = row.querySelector('.phase-dot');
    if (dot) {
      dot.style.background = 'var(--text)';
      dot.innerHTML = '<span class="spinner" style="width:10px;height:10px;border-width:1.5px;border-color:transparent;border-top-color:#000"></span>';
    }
    await new Promise(r => setTimeout(r, durations[i]));
    if (dot) {
      dot.style.background = 'var(--pos)';
      dot.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    }
  }

  w.generating = false;
  w.generationDone = true;
  render();
}

async function startCheckout() {
  const w = state.wizard;
  // Guardar config para crear bot tras pago
  const botConfig = {
    name: w.data.name,
    description: `${w.data.strategy} · ${w.data.pair}`,
    strategy: w.data.strategy,
    parameters: {
      market: w.data.market, pair: w.data.pair, leverage: w.data.leverage,
      avatar: w.data.avatar, indicators: w.data.indicators,
      timeframe: w.data.timeframe, lot: w.data.lot,
      risk: w.data.risk, news: w.data.news, funded: w.data.funded,
    },
    _ts: Date.now(),
  };
  // Guardamos en localStorage solo como fallback de UI (recuperar config si
  // el usuario vuelve a abrir el wizard sin haber pagado). La verdad de
  // este bot la tiene el backend en `pending_bots`.
  try { localStorage.setItem('pendingBotConfig', JSON.stringify(botConfig)); } catch (_) {}

  try {
    // Mandamos el config completo al backend: lo guarda como PendingBot y
    // mete el id en custom_data de Lemon. Cuando el webhook reciba el pago,
    // creará el Bot real automáticamente sin depender de que el usuario
    // vuelva al app.
    const res = await api('/payments/checkout-custom', {
      method: 'POST',
      body: JSON.stringify({ botName: w.data.name, botConfig }),
    });
    if (res.url) {
      window.location.href = res.url;
    }
  } catch (e) {
    toast('Error al crear sesión de pago', 'error');
  }
}

    document.getElementById('select-mt5')?.addEventListener('click', () => { state.guideBroker = 'mt5'; state.guideStep = 0; render(); });
    document.getElementById('select-mt4')?.addEventListener('click', () => { state.guideBroker = 'mt4'; state.guideStep = 0; render(); });
    return;
  }

  // Pasos
  const isMT5 = state.guideBroker === 'mt5';
  const ext = isMT5 ? '.mq5' : '.mq4';
  const folder = isMT5 ? 'MQL5' : 'MQL4';
  const platName = isMT5 ? 'MetaTrader 5' : 'MetaTrader 4';

  const steps = [
    { title: 'Ten el archivo descargado', body: `Antes de empezar, descarga el archivo ${ext} desde el detalle de tu bot.`, details: ['El archivo es código fuente Expert Advisor', 'En el siguiente paso lo compilarás dentro de MetaEditor para convertirlo en ejecutable'] },
    { title: `Abre ${platName}`, body: `Inicia ${platName} en tu ordenador. Si no lo tienes, descárgalo desde tu broker.`, details: ['Asegúrate de estar logueado en tu cuenta (real o demo)', 'Recomendamos cuenta demo para los primeros días'] },
    { title: 'Abre la carpeta de datos', body: `En ${platName}: Archivo → Abrir carpeta de datos.`, details: ['En inglés: File → Open Data Folder', `Verás carpetas como config, history, ${folder}`] },
    { title: 'Copia el archivo en Experts', body: `Entra en ${folder} → Experts. Pega aquí tu archivo ${ext}.`, details: [`Ruta exacta: ${folder}/Experts/`, 'Si la carpeta Experts no existe, créala'] },
    { title: 'Abre MetaEditor (F4) y compila', body: `Vuelve a ${platName} y pulsa F4 (o menú: Herramientas → MetaQuotes Language Editor). Se abre el editor.`, details: ['En el panel izquierdo del editor → Experts → busca tu archivo y haz doble click', `Pulsa F7 (o botón "Compilar" arriba) para compilar el ${ext}`, 'Abajo verás "0 errores, 0 advertencias" si todo va bien · si hay errores, contacta soporte'] },
    { title: `Reinicia ${platName}`, body: 'Cierra y vuelve a abrir la plataforma para que detecte el bot ya compilado.', details: ['Alternativa rápida: en el panel "Navegador" pulsa F5 para refrescar', 'Tu bot aparecerá en "Asesores Expertos" con el nombre que le pusiste'] },
    { title: 'Activa AutoTrading', body: 'Click en el botón "AutoTrading" de la barra superior hasta que esté VERDE.', details: ['Botón con icono de play · Verde = activo · Rojo = desactivado', 'Sin esto el bot está cargado pero NO opera'] },
    { title: 'Abre el gráfico del par y carga el bot', body: `Abre el gráfico del par que configuraste (ej: EURUSD). En el Navegador → Asesores Expertos → doble click sobre tu bot.`, details: ['Aparecerá una ventana de configuración del bot', 'Marca la pestaña "Comunes" → "Permitir trading automático"', 'Click en "Cargar" (Aceptar) y el bot se activa en el gráfico', 'En la esquina superior derecha del gráfico verás 😊 verde = bot operando'] },
    { title: '¡Listo! Bot operando', body: 'Tu bot está funcionando 24/7 con tus reglas de riesgo.', details: ['IMPORTANTE: el ordenador debe estar encendido y MetaTrader abierto', 'Alternativa: alquila un VPS (~$10/mes) para que opere sin tu PC'] },
  ];
  const cur = steps[state.guideStep];

  root.innerHTML = `
    <div class="container container-narrow">
      <button class="btn btn-soft fade-up" id="back-to-broker" style="margin-bottom:24px">${I.arrowLeft} Cambiar plataforma</button>

      <div class="eyebrow fade-up">${platName}</div>
      <h1 class="h1 fade-up">Paso ${state.guideStep + 1} de ${steps.length}</h1>

      <div class="wizard-progress" style="margin-top:18px">
        ${steps.map((_, i) => `<div class="wizard-progress-bar ${i <= state.guideStep ? 'done' : ''}"></div>`).join('')}
      </div>

      <div class="card card-pad-lg fade-up" style="margin-top:32px">
        <div class="flex items-center gap-3" style="margin-bottom:16px">
          <div style="width:40px;height:40px;border-radius:20px;background:var(--text);color:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-size:14px;font-weight:800">${state.guideStep + 1}</div>
          <h2 class="h2">${cur.title}</h2>
        </div>
        <p style="font-size:15px;line-height:1.6;margin-bottom:18px">${cur.body}</p>
        <div class="card" style="background:var(--bg-soft);padding:16px">
          <ul style="list-style:none;display:flex;flex-direction:column;gap:8px">
            ${cur.details.map(d => `
              <li style="display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--text-dim);line-height:1.5">
                <div style="width:5px;height:5px;border-radius:3px;background:var(--text);margin-top:7px;flex-shrink:0"></div>
                <span>${d}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      </div>

      <div class="flex gap-3 fade-up" style="margin-top:18px">
        ${state.guideStep > 0 ? `<button class="btn btn-soft" id="guide-prev">${I.arrowLeft} Anterior</button>` : ''}
        <button class="btn btn-primary" id="guide-next" style="flex:1;justify-content:center">
          ${state.guideStep < steps.length - 1 ? 'Siguiente' : 'Finalizar'}
          ${state.guideStep < steps.length - 1 ? '<span class="btn-arrow">→</span>' : I.check}
        </button>
      </div>

      <div class="card card-hover fade-up" style="margin-top:24px;display:flex;align-items:center;gap:14px;cursor:pointer" onclick="window.open('https://youtu.be/b_pSuUhsi40?si=_7D6b3zkOx5ZUr4R', '_blank')">
        <div style="width:42px;height:42px;border-radius:10px;background:#FF0000;color:#fff;display:flex;align-items:center;justify-content:center">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </div>
        <div style="flex:1">
          <div class="h3">Ver video tutorial</div>
          <div class="text-dim mt-2" style="font-size:13px">Tutorial paso a paso en YouTube</div>
        </div>
        ${I.arrow}
      </div>
    </div>
  `;
  document.getElementById('back-to-broker')?.addEventListener('click', () => { state.guideBroker = null; render(); });
  document.getElementById('guide-prev')?.addEventListener('click', () => { state.guideStep--; render(); });
  document.getElementById('guide-next')?.addEventListener('click', () => {
    if (state.guideStep < steps.length - 1) { state.guideStep++; render(); }
    else { state.guideBroker = null; state.guideStep = 0; toast('¡Guía completada!', 'success'); render(); }
  });
}

function loadAccount(root) {
  const u = state.user || {};
  const initial = (u.name || 'U')[0].toUpperCase();
  root.innerHTML = `
    <div class="container container-narrow">
      <h1 class="h1 fade-up">Mi cuenta</h1>

      <div class="card card-pad-lg fade-up" style="margin-top:28px;display:flex;align-items:center;gap:18px;">

        <div style="flex:1;min-width:0">
          <div style="font-family:'Inter Tight';font-size:22px;font-weight:800;letter-spacing:-0.02em;">${_esc(u.name || 'Usuario')}</div>
          <div class="text-dim mt-2" style="font-size:14px;overflow:hidden;text-overflow:ellipsis">${_esc(u.email || '')}</div>
        </div>
      </div>

      <div class="account-section">
        <h2 class="account-section-title">Información personal</h2>

        <form class="card account-form" id="account-name-form">
          <label class="field-label" for="acc-name">Nombre completo</label>
          <div style="display:flex;gap:10px">
            <input class="input" id="acc-name" name="name" type="text" required maxlength="80" value="${_esc(u.name || '')}" autocomplete="name" style="flex:1"/>
            <button type="submit" class="btn btn-primary" style="white-space:nowrap">Guardar</button>
          </div>
        </form>

        <form class="card account-form" id="account-email-form" style="margin-top:12px">
          <label class="field-label" for="acc-email">Email</label>
          <div style="display:flex;gap:10px">
            <input class="input" id="acc-email" name="email" type="email" required value="${_esc(u.email || '')}" autocomplete="email" style="flex:1"/>
            <button type="submit" class="btn btn-primary" style="white-space:nowrap">Guardar</button>
          </div>
          <div class="text-dim" style="font-size:12px;margin-top:8px">Te enviaremos un código al nuevo email para confirmar el cambio.</div>

          <div id="email-change-verify" style="display:none;margin-top:18px;padding-top:18px;border-top:1px solid var(--border)">
            <div class="field-label">Confirma tu nuevo email</div>
            <div class="text-dim" style="font-size:12px;margin-bottom:12px">Hemos enviado un código de 6 dígitos a <strong id="email-change-hint" style="color:var(--text)"></strong>. Introdúcelo aquí:</div>
            <div class="otp-row" style="margin-bottom:14px">
              ${[0,1,2,3,4,5].map(i => `<input class="otp-input email-change-otp" type="tel" inputmode="numeric" maxlength="1" data-otp-i="${i}"/>`).join('')}
            </div>
            <div style="display:flex;gap:10px">
              <button type="button" class="btn btn-primary" id="email-change-confirm" style="flex:1;justify-content:center">Confirmar</button>
              <button type="button" class="btn btn-soft" id="email-change-cancel" style="white-space:nowrap">Cancelar</button>
            </div>
          </div>
        </form>
      </div>

      <div class="account-section">
        <h2 class="account-section-title">Seguridad</h2>

        <form class="card account-form" id="account-pw-form">
          <label class="field-label" for="acc-pw-current">Contraseña actual</label>
          <input class="input" id="acc-pw-current" type="password" required autocomplete="current-password" placeholder="••••••••"/>

          <label class="field-label" for="acc-pw-new" style="margin-top:14px">Nueva contraseña</label>
          <input class="input" id="acc-pw-new" type="password" required minlength="8" autocomplete="new-password" placeholder="Mínimo 8 caracteres"/>
          <div id="acc-pw-strength" style="display:none;margin-top:8px">
            <div class="pw-bar"><div class="pw-bar-fill" id="acc-pw-bar-fill"></div></div>
            <div class="pw-rules">
              <span class="pw-rule" id="acc-r-len">${I.dot} 8+ caracteres</span>
              <span class="pw-rule" id="acc-r-upper">${I.dot} Una mayúscula</span>
              <span class="pw-rule" id="acc-r-num">${I.dot} Un número</span>
            </div>
          </div>

          <label class="field-label" for="acc-pw-new2" style="margin-top:14px">Repetir nueva contraseña</label>
          <input class="input" id="acc-pw-new2" type="password" required autocomplete="new-password" placeholder="Repite la nueva contraseña"/>

          <button type="submit" class="btn btn-primary" style="margin-top:16px;width:100%;justify-content:center">Cambiar contraseña</button>
        </form>

        <button class="btn btn-soft" id="logout-everywhere-btn" style="margin-top:14px;width:100%;justify-content:center">
          ${I.logout} Cerrar sesión en todos los dispositivos
        </button>
        <div class="text-dim" style="font-size:12px;margin-top:8px;line-height:1.5">
          Invalida tu sesión en este y cualquier otro navegador o móvil donde estuvieras logueado. Útil si pierdes un dispositivo.
        </div>
      </div>

      <div class="account-section">
        <h2 class="account-section-title">Pagos y bots</h2>
        <div class="card fade-up" style="display:flex;align-items:center;gap:14px;cursor:pointer" id="recover-bots-btn">
          ${I.download}
          <div style="flex:1">
            <div class="h3">Recuperar bots pagados</div>
            <div class="text-dim mt-2" style="font-size:13px">Si pagaste un bot pero no aparece en tu dashboard, click aquí. Buscamos en Lemon Squeezy las órdenes a tu nombre y creamos los bots que falten.</div>
          </div>
          ${I.arrow}
        </div>
      </div>

      <div class="account-section">
        <h2 class="account-section-title">Idioma · Language</h2>
        <div class="card fade-up" style="display:flex;align-items:center;gap:10px">
          <button class="btn ${APP_LANG === 'es' ? 'btn-primary' : 'btn-soft'}" style="flex:1;justify-content:center" id="lang-es-btn">Español</button>
          <button class="btn ${APP_LANG === 'en' ? 'btn-primary' : 'btn-soft'}" style="flex:1;justify-content:center" id="lang-en-btn">English</button>
        </div>
      </div>

      <div class="account-section">
        <h2 class="account-section-title">Ayuda y cuenta</h2>

        <div class="card fade-up" style="display:flex;align-items:center;gap:14px;cursor:pointer" id="goto-support">
          ${I.mail}
          <div style="flex:1">
            <div class="h3">Contactar soporte</div>
          </div>
          ${I.arrow}
        </div>

        <button class="btn btn-soft" id="logout-btn" style="margin-top:12px;width:100%;justify-content:center;color:var(--neg);border-color:rgba(255,71,87,0.2)">${I.logout} Cerrar sesión</button>
      </div>
    </div>
  `;

  // Logout
  document.getElementById('logout-btn')?.addEventListener('click', () => {
    clearAuth();
    state.currentScreen = 'auth';
    render();
  });
  document.getElementById('goto-support')?.addEventListener('click', () => {
    state.currentScreen = 'support';
    render();
  });

  // Cambio de idioma: persiste preferencia (en localStorage para el redirect
  // del app + en backend para que los emails salgan en el idioma elegido) y
  // salta al app del idioma elegido. El propio app re-leerá lang al cargar.
  document.getElementById('lang-es-btn')?.addEventListener('click', async () => {
    try { localStorage.setItem('lang', 'es'); } catch(e) {}
    try { await api('/auth/lang', { method: 'POST', body: JSON.stringify({ lang: 'es' }) }); } catch (e) {}
    if (window.location.pathname.startsWith('/en/')) window.location.href = '/app';
  });
  document.getElementById('lang-en-btn')?.addEventListener('click', async () => {
    try { localStorage.setItem('lang', 'en'); } catch(e) {}
    try { await api('/auth/lang', { method: 'POST', body: JSON.stringify({ lang: 'en' }) }); } catch (e) {}
    if (!window.location.pathname.startsWith('/en/')) window.location.href = '/en/app';
  });
  document.getElementById('logout-everywhere-btn')?.addEventListener('click', async () => {
    if (!confirm('¿Cerrar sesión en todos los dispositivos? Tendrás que volver a iniciar sesión en cada navegador o móvil donde la usabas.')) return;
    try {
      await api('/auth/logout-everywhere', { method: 'POST' });
      toast('Sesión cerrada en todos los dispositivos', 'success');
      // Limpiamos también este cliente: el JWT actual quedó invalidado por
      // el bump de tokenVersion, así que cualquier siguiente llamada al
      // backend nos echaría con 403. Mejor caer al login de inmediato.
      clearAuth();
      state.currentScreen = 'auth';
      render();
    } catch (e) {
      toast(e.message || 'Error', 'error');
    }
  });
  document.getElementById('recover-bots-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('recover-bots-btn');
    if (btn.dataset.busy === '1') return;
    btn.dataset.busy = '1';
    const originalText = btn.querySelector('.h3')?.textContent;
    if (btn.querySelector('.h3')) btn.querySelector('.h3').textContent = 'Buscando órdenes…';
    try {
      const res = await api('/payments/recover', { method: 'POST' });
      if (res.count > 0) {
        toast(`✅ ${res.count} bot${res.count > 1 ? 's' : ''} recuperado${res.count > 1 ? 's' : ''}. Ve al Dashboard.`, 'success');
      } else {
        toast('No hay pagos pendientes a tu nombre', 'success');
      }
    } catch (e) {
      toast(e.message || 'Error al recuperar bots', 'error');
    } finally {
      btn.dataset.busy = '0';
      if (btn.querySelector('.h3') && originalText) btn.querySelector('.h3').textContent = originalText;
    }
  });

  // Update name
  document.getElementById('account-name-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('acc-name').value.trim();
    if (name.length < 2) { toast('Pon tu nombre completo', 'error'); return; }
    try {
      const data = await api('/auth/me', { method: 'PUT', body: JSON.stringify({ name }) });
      state.user = data.user;
      try { localStorage.setItem('user', JSON.stringify(data.user)); } catch (_) {}
      toast('Nombre actualizado', 'success');
      render();
    } catch (err) {
      toast(err.message || 'No se pudo actualizar', 'error');
    }
  });

  // Update email — pide código al nuevo email antes de aplicar el cambio
  const emailVerifyBox = document.getElementById('email-change-verify');
  const emailHintEl = document.getElementById('email-change-hint');
  const emailOtpInputs = document.querySelectorAll('.email-change-otp');

  // OTP UX (auto-avance, backspace, paste)
  emailOtpInputs.forEach((el, i) => {
    el.addEventListener('input', (e) => {
      const v = (e.target.value || '').replace(/\D/g, '').slice(0, 1);
      e.target.value = v;
      if (v && emailOtpInputs[i + 1]) emailOtpInputs[i + 1].focus();
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && emailOtpInputs[i - 1]) emailOtpInputs[i - 1].focus();
    });
    el.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData?.getData('text') || '').replace(/\D/g, '').slice(0, 6);
      [...text].forEach((ch, idx) => { if (emailOtpInputs[idx]) emailOtpInputs[idx].value = ch; });
      if (text.length === 6) emailOtpInputs[5]?.focus();
    });
  });

  document.getElementById('account-email-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('acc-email').value.trim().toLowerCase();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Email no válido', 'error'); return; }
    if (email === (state.user?.email || '').toLowerCase()) { toast('Ese email ya es el tuyo', 'info'); return; }
    try {
      const data = await api('/auth/me', { method: 'PUT', body: JSON.stringify({ email }) });
      if (data.emailChangeRequested) {
        // Mostrar el bloque de OTP con la pista del email
        emailHintEl.textContent = data.emailHint || email;
        emailVerifyBox.style.display = '';
        emailOtpInputs.forEach(x => x.value = '');
        emailOtpInputs[0]?.focus();
        toast('Código enviado al nuevo email', 'success');
      } else {
        toast('Email actualizado', 'success');
        state.user = data.user;
        try { localStorage.setItem('user', JSON.stringify(data.user)); } catch (_) {}
        render();
      }
    } catch (err) {
      toast(err.message || 'No se pudo actualizar', 'error');
    }
  });

  document.getElementById('email-change-cancel')?.addEventListener('click', () => {
    emailVerifyBox.style.display = 'none';
    emailOtpInputs.forEach(x => x.value = '');
  });

  document.getElementById('email-change-confirm')?.addEventListener('click', async () => {
    const code = [...emailOtpInputs].map(x => x.value).join('');
    if (!/^\d{6}$/.test(code)) { toast('Mete los 6 dígitos del código', 'error'); return; }
    try {
      const data = await api('/auth/verify-email-change', { method: 'POST', body: JSON.stringify({ code }) });
      state.user = data.user;
      try { localStorage.setItem('user', JSON.stringify(data.user)); } catch (_) {}
      toast('Email actualizado correctamente', 'success');
      emailVerifyBox.style.display = 'none';
      render();
    } catch (err) {
      toast(err.message || 'Código incorrecto', 'error');
    }
  });

  // Password strength meter
  const pwNew = document.getElementById('acc-pw-new');
  const fill = document.getElementById('acc-pw-bar-fill');
  const strengthBox = document.getElementById('acc-pw-strength');
  const rLen = document.getElementById('acc-r-len');
  const rUpper = document.getElementById('acc-r-upper');
  const rNum = document.getElementById('acc-r-num');
  pwNew?.addEventListener('input', () => {
    const v = pwNew.value || '';
    if (strengthBox) strengthBox.style.display = v.length > 0 ? '' : 'none';
    const okLen = v.length >= 8;
    const okUpper = /[A-Z]/.test(v);
    const okNum = /\d/.test(v);
    rLen?.classList.toggle('ok', okLen);
    rUpper?.classList.toggle('ok', okUpper);
    rNum?.classList.toggle('ok', okNum);
    const score = (okLen ? 1 : 0) + (okUpper ? 1 : 0) + (okNum ? 1 : 0) + (v.length >= 12 ? 1 : 0);
    if (fill) {
      fill.style.width = (score / 4) * 100 + '%';
      fill.className = 'pw-bar-fill s' + Math.max(1, score);
    }
  });

  // Change password
  document.getElementById('account-pw-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const currentPassword = document.getElementById('acc-pw-current').value;
    const newPassword = document.getElementById('acc-pw-new').value;
    const confirm2 = document.getElementById('acc-pw-new2').value;
    if (newPassword !== confirm2) { toast('Las contraseñas nuevas no coinciden', 'error'); return; }
    if (newPassword.length < 8 || !/[A-Z]/.test(newPassword) || !/\d/.test(newPassword)) {
      toast('La nueva contraseña necesita 8+ chars, mayúscula y número', 'error');
      return;
    }
    if (currentPassword === newPassword) { toast('La nueva contraseña debe ser distinta de la actual', 'error'); return; }
    try {
      await api('/auth/change-password', { method: 'POST', body: JSON.stringify({ currentPassword, newPassword }) });
      toast('Contraseña actualizada', 'success');
      // Reset form
      document.getElementById('acc-pw-current').value = '';
      document.getElementById('acc-pw-new').value = '';
      document.getElementById('acc-pw-new2').value = '';
      if (strengthBox) strengthBox.style.display = 'none';
    } catch (err) {
      toast(err.message || 'No se pudo cambiar la contraseña', 'error');
    }
  });
}
