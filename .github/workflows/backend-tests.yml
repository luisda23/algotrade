# Backend tests (golden-file MQL generator suite).
#
# Corre en cada push y cada PR que toque archivos del backend. Si una
# modificación al generator rompe alguno de los 57 outputs golden, el
# build falla y bloquea el merge — así cualquier cambio al MQL5/MQL4
# pasa por una validación deterministica de los 24 indicadores.
#
# Para refrescar goldens cuando un cambio es legítimo:
#   cd backend && npm run test:update-goldens
#   git add backend/src/utils/__tests__/goldens && git commit

name: backend tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # `npm ci` ejecuta postinstall (prisma generate). Necesitamos un
      # DATABASE_URL aunque no nos conectemos — Prisma lo valida en boot.
      - name: Install deps
        run: npm ci
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
