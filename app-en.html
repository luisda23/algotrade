<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>YudBot · App</title>
<meta name="description" content="Create, manage and download your trading bots"/>
<meta name="robots" content="noindex,nofollow"/>
<meta name="theme-color" content="#000000"/>
<link rel="icon" type="image/png" href="/icon-192.png"/>
<link rel="manifest" href="/manifest.json"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
// Apply theme before paint to prevent flash. Default is light.
(() => {
  const stored = localStorage.getItem('theme');
  if (stored !== 'dark') document.documentElement.setAttribute('data-theme', 'light');
})();
</script>

<style>
:root {
  --bg: #000000;
  --bg-soft: #050505;
  --bg-card: #0A0A0A;
  --bg-elev: #141414;
  --bg-input: #0F0F0F;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.18);
  --text: #FFFFFF;
  --text-dim: rgba(255,255,255,0.65);
  --text-mute: rgba(255,255,255,0.4);
  --pos: #00D17A;
  --pos-soft: rgba(0,209,122,0.12);
  --neg: #FF4757;
  --neg-soft: rgba(255,71,87,0.12);
  --warn: #F59E0B;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

[data-theme="light"] {
  --bg: #FFFFFF;
  --bg-soft: #FAFAFA;
  --bg-card: #F5F5F5;
  --bg-elev: #EEEEEE;
  --bg-input: #FFFFFF;
  --border: rgba(0,0,0,0.10);
  --border-strong: rgba(0,0,0,0.20);
  --text: #000000;
  --text-dim: rgba(0,0,0,0.65);
  --text-mute: rgba(0,0,0,0.4);
}

html, body { transition: background-color 0.3s var(--ease), color 0.3s var(--ease); }

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'cv11', 'ss01';
  line-height: 1.5;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--text-mute); }
::selection { background: var(--text); color: var(--bg); }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
@keyframes dotPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }

.fade-up { animation: fadeUp 0.5s var(--ease); }
.fade-in { animation: fadeIn 0.4s ease; }

/* Modern B/W slider */
.slider-modern {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 999px;
  background: linear-gradient(to right,
    var(--text) 0%,
    var(--text) var(--val, 50%),
    rgba(127,127,127,0.18) var(--val, 50%),
    rgba(127,127,127,0.18) 100%);
  outline: none;
  cursor: pointer;
  margin: 4px 0;
}
.slider-modern::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--text);
  border: 4px solid var(--bg);
  box-shadow: 0 0 0 1px rgba(127,127,127,0.4), 0 4px 14px rgba(0,0,0,0.35);
  cursor: grab;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.slider-modern::-webkit-slider-thumb:hover {
  transform: scale(1.15);
  box-shadow: 0 0 0 1px var(--text), 0 6px 18px rgba(0,0,0,0.4);
}
.slider-modern::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.05); }
.slider-modern::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--text);
  border: 4px solid var(--bg);
  box-shadow: 0 0 0 1px rgba(127,127,127,0.4), 0 4px 14px rgba(0,0,0,0.35);
  cursor: grab;
}
.slider-modern::-moz-range-track {
  height: 6px;
  border-radius: 999px;
  background: rgba(127,127,127,0.18);
}
.slider-modern::-moz-range-progress {
  height: 6px;
  border-radius: 999px;
  background: var(--text);
}

/* ===================== LAYOUT ===================== */
.app-shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}
@media (max-width: 1023px) {
  .app-shell { grid-template-columns: 1fr; }
}

/* Sidebar (desktop) */
.sidebar {
  background: var(--bg-soft);
  border-right: 1px solid var(--border);
  padding: 28px 18px;
  display: flex;
  flex-direction: column;
  position: sticky; top: 0;
  height: 100vh;
  overflow-y: auto;
}
@media (max-width: 1023px) { .sidebar { display: none; } }

.brand {
  display: flex; align-items: center; gap: 11px;
  padding: 0 12px 28px;
  font-family: 'Inter Tight', sans-serif;
  font-weight: 700; font-size: 18px;
  letter-spacing: -0.3px;
}
.brand-logo {
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  line-height: 0;
}
.brand-logo-img { display: block; object-fit: contain; }

/* Logo theme-switch */
.logo-on-dark { display: none; }   /* En tema claro: ocultamos el logo blanco */
[data-theme="light"] .logo-on-dark { display: none; }
[data-theme="light"] .logo-on-light { display: block; }
:root:not([data-theme="light"]) .logo-on-light { display: none; }
:root:not([data-theme="light"]) .logo-on-dark { display: block; }

.nav-list { display: flex; flex-direction: column; gap: 3px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: 10px;
  color: var(--text-dim);
  font-size: 14px; font-weight: 500;
  width: 100%; text-align: left;
  transition: background 0.15s, color 0.15s;
}
.nav-item:hover { background: var(--bg-card); color: var(--text); }
.nav-item.active { background: var(--text); color: var(--bg); font-weight: 600; }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

.sidebar-footer {
  margin-top: auto; padding-top: 20px;
}
.user-pill {
  display: flex; align-items: center; gap: 11px;
  padding: 11px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.user-avatar {
  width: 36px; height: 36px; border-radius: 18px;
  background: var(--text); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter Tight'; font-weight: 700; font-size: 15px;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-email { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

.theme-toggle-app {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 10px 12px;
  margin-bottom: 8px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  transition: color 0.2s var(--ease), background 0.2s var(--ease), border-color 0.2s var(--ease);
}
.theme-toggle-app:hover { color: var(--text); border-color: var(--border-strong); background: var(--bg-card); }
.theme-toggle-app svg { width: 16px; height: 16px; }
.theme-toggle-app .theme-icon-sun { display: none; }
[data-theme="light"] .theme-toggle-app .theme-icon-sun { display: block; }
[data-theme="light"] .theme-toggle-app .theme-icon-moon { display: none; }
.theme-toggle-label { font-weight: 500; }

.theme-toggle-mobile {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  cursor: pointer;
  transition: color 0.2s var(--ease), border-color 0.2s var(--ease);
}
.theme-toggle-mobile:hover, .theme-toggle-mobile:active { color: var(--text); border-color: var(--border-strong); }
.theme-toggle-mobile svg { width: 16px; height: 16px; }
.theme-toggle-mobile .theme-icon-sun { display: none; }
[data-theme="light"] .theme-toggle-mobile .theme-icon-sun { display: block; }
[data-theme="light"] .theme-toggle-mobile .theme-icon-moon { display: none; }

/* Mobile top bar + bottom nav */
.mobile-top {
  display: none;
  position: sticky; top: 0; z-index: 50;
  padding: 14px 20px;
  background: color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  align-items: center; justify-content: space-between;
}
.mobile-bottom {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  padding: 8px 8px 16px;
  background: color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter: blur(14px);
  border-top: 1px solid var(--border);
  justify-content: space-around;
}
.mobile-tab {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 12px;
  color: var(--text-dim);
  font-size: 10px; font-weight: 600;
  flex: 1;
  transition: color 0.15s;
}
.mobile-tab.active { color: var(--text); }
.mobile-tab svg { width: 20px; height: 20px; }
@media (max-width: 1023px) {
  .mobile-top { display: flex; }
  .mobile-bottom { display: flex; }
  main { padding-bottom: 80px; }
}

/* Main content */
main {
  background: var(--bg);
  min-height: 100vh;
}
.container {
  max-width: 1280px; margin: 0 auto;
  padding: clamp(24px, 4vw, 56px) clamp(20px, 3vw, 48px);
  width: 100%;
}
.container-narrow { max-width: 780px; }

/* ===================== TYPOGRAPHY ===================== */
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1.4px;
  color: var(--text-mute);
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 999px;
  margin-bottom: 20px;
}
.eyebrow::before {
  content: ''; width: 4px; height: 4px; border-radius: 2px;
  background: var(--text-mute);
}
.h1 {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 800; letter-spacing: -0.04em;
  line-height: 1.02;
  color: var(--text);
}
.h2 {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(22px, 2.4vw, 28px);
  font-weight: 700; letter-spacing: -0.02em;
  line-height: 1.1;
}
.h3 {
  font-family: 'Inter Tight', sans-serif;
  font-size: 18px; font-weight: 700; letter-spacing: -0.02em;
}
.text-dim { color: var(--text-dim); }
.text-mute { color: var(--text-mute); }
.mono { font-family: 'JetBrains Mono', monospace; }
.label-up {
  font-size: 11px; color: var(--text-mute);
  text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;
}

/* ===================== BUTTONS ===================== */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 13px 22px; border-radius: 12px;
  font-size: 14px; font-weight: 600;
  transition: all 0.2s var(--ease);
  white-space: nowrap;
}
.btn-primary { background: var(--text); color: var(--bg); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 30px rgba(127,127,127,0.18); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-ghost {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-ghost:hover { background: var(--bg-elev); border-color: var(--border-strong); }
.btn-soft {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-soft:hover { background: var(--bg-elev); border-color: var(--border-strong); }
.btn-danger {
  background: var(--neg-soft); color: var(--neg);
  border: 1px solid rgba(255,71,87,0.2);
}
.btn-success { background: var(--pos); color: #000; }
.btn-large { padding: 16px 28px; font-size: 15px; border-radius: 14px; }
.btn-arrow { transition: transform 0.2s var(--ease); }
.btn:hover .btn-arrow { transform: translateX(3px); }

/* ===================== CARDS ===================== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px;
  transition: border-color 0.2s, transform 0.2s var(--ease), background 0.2s;
}
.card-hover:hover {
  transform: translateY(-3px);
  border-color: var(--border-strong);
  background: var(--bg-elev);
}
.card-pad-lg { padding: 32px; }

/* ===================== FORMS ===================== */
.input {
  width: 100%; height: 52px;
  padding: 0 18px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 15px; font-weight: 500;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.input:focus {
  border-color: var(--text-mute);
  background: var(--bg-elev);
}
.input-with-icon { padding-left: 46px; }
.input-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--text-mute);
  pointer-events: none;
}
.input-wrap { position: relative; }

.field-label {
  display: block;
  font-size: 11px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1.2px;
  font-weight: 600;
  margin-bottom: 10px;
}

/* ===================== AUTH SCREEN ===================== */
.auth-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.auth-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.03), transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(255,255,255,0.03), transparent 60%);
  pointer-events: none;
}
.auth-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 75%);
  pointer-events: none;
}
.auth-card {
  position: relative; z-index: 1;
  width: 100%; max-width: 440px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 44px 36px;
}
/* Versión div: usada con un SVG icono contextual dentro (mail, lock, etc.) */
.auth-logo {
  width: 56px; height: 56px; border-radius: 14px;
  background: var(--text); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
}
/* Wrap del logo de marca en pantallas auth — ya no necesita fondo (los SVGs lo traen) */
.auth-logo-img-wrap {
  width: 56px; height: 56px;
  background: transparent;
  border-radius: 0;
  display: block;
  margin: 0 auto 24px;
  line-height: 0;
}
.auth-logo-img-wrap img { width: 56px; height: 56px; object-fit: contain; }
.auth-card h1 {
  text-align: center;
  font-family: 'Inter Tight', sans-serif;
  font-size: 30px; font-weight: 800; letter-spacing: -0.03em;
  margin-bottom: 8px;
}
.auth-card .sub {
  text-align: center;
  font-size: 14px; color: var(--text-dim);
  margin-bottom: 32px;
}
.auth-form {
  display: flex; flex-direction: column; gap: 12px;
}
.auth-toggle {
  text-align: center; margin-top: 22px;
  font-size: 14px; color: var(--text-dim);
}
.auth-toggle button {
  color: var(--text); font-weight: 600; padding-left: 4px;
}
.auth-error {
  background: var(--neg-soft); color: var(--neg);
  border: 1px solid rgba(255,71,87,0.2);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 13px;
  display: flex; align-items: center; gap: 8px;
}
.auth-error svg { width: 16px; height: 16px; flex-shrink: 0; }
.auth-info {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px;
  background: var(--pos-soft); color: var(--pos);
  border: 1px solid rgba(0,209,122,0.22);
  border-radius: 10px;
  font-size: 13px; font-weight: 500;
}
.auth-info svg { width: 16px; height: 16px; flex-shrink: 0; }
.visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

.input-with-action { padding-right: 46px; }
.input-action {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; cursor: pointer;
  color: var(--text-mute);
  border-radius: 8px;
  transition: color 0.15s, background 0.15s;
}
.input-action:hover { color: var(--text); background: var(--bg-elev); }
.input-action svg { width: 18px; height: 18px; }

.pw-bar {
  height: 4px; border-radius: 4px; background: var(--border);
  margin: 4px 0 8px; overflow: hidden;
}
.pw-bar-fill {
  height: 100%; width: 0%; border-radius: 4px;
  background: var(--neg);
  transition: width 0.25s var(--ease), background 0.25s;
}
.pw-bar-fill.s2 { background: #FFB020; }
.pw-bar-fill.s3 { background: #FFB020; }
.pw-bar-fill.s4 { background: var(--pos); }
.pw-rules {
  display: flex; flex-wrap: wrap; gap: 6px 14px;
  font-size: 11.5px; color: var(--text-mute);
  margin-bottom: 4px;
}
.pw-rule { display: inline-flex; align-items: center; gap: 5px; transition: color 0.2s; }
.pw-rule svg { width: 6px; height: 6px; transition: color 0.2s; }
.pw-rule.ok { color: var(--pos); }

.terms-row {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 12.5px; color: var(--text-dim); line-height: 1.4;
  cursor: pointer;
  margin: 4px 0;
}
.terms-row input[type="checkbox"] {
  margin-top: 2px;
  accent-color: var(--text);
  width: 16px; height: 16px;
  flex-shrink: 0;
  cursor: pointer;
}
.terms-row a { color: var(--text); text-decoration: underline; }

.auth-link-sub {
  background: transparent; border: none; cursor: pointer;
  font-size: 12.5px; color: var(--text-dim);
  padding: 2px 0;
  transition: color 0.15s;
}
.auth-link-sub:hover { color: var(--text); }

.otp-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  width: 100%;
}
.otp-input {
  width: 100%;
  min-width: 0;
  height: 56px;
  padding: 0;
  font-family: 'Inter Tight', sans-serif;
  font-size: 24px;
  font-weight: 700;
  text-align: center;
  background: var(--bg-input);
  border: 2px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  box-sizing: border-box;
}
.otp-input:focus { border-color: var(--text); background: var(--bg-elev); }
.otp-input:not(:placeholder-shown) { border-color: var(--border-strong); }
@media (max-width: 420px) {
  .otp-input { height: 48px; font-size: 20px; }
  .otp-row { gap: 6px; }
}

.account-section { margin-top: 32px; }
.account-section-title {
  font-family: 'Inter Tight', sans-serif;
  font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--text-mute);
  margin-bottom: 12px;
  padding-left: 4px;
}
.account-form { padding: 20px; }
.account-form .field-label { display: block; }

/* Icon sizing default (todos los SVG inline) */
svg { display: block; }
.input-icon svg { width: 18px; height: 18px; }
.create-cta-icon svg { width: 28px; height: 28px; }
.create-cta-btn svg { width: 16px; height: 16px; }
.bot-card-avatar svg { width: 32px; height: 32px; }
.empty-state-icon svg { width: 32px; height: 32px; }
.btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.wizard-back svg { width: 14px; height: 14px; }
.status-badge svg { width: 12px; height: 12px; }

<script>

(() => {
  try {
    const chosen = localStorage.getItem('lang');

// =====================================================
//  PERSISTENCE
// =====================================================
function loadAuth() {
  // Solo cargar si no hay sesión ya iniciada (evita reset en cada render)
  if (state.token) return;
  try {
    const t = localStorage.getItem('token');
    const u = localStorage.getItem('user');
    if (t && u) {
      state.token = t;
      state.user = JSON.parse(u);
      state.currentScreen = 'dashboard';
    }
  } catch (e) {}
}
function saveAuth(token, user) {
  localStorage.setItem('token', token);
  localStorage.setItem('user', JSON.stringify(user));
  state.token = token;
  state.user = user;
}
function clearAuth() {
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  state.token = null;
  state.user = null;
  state.bots = [];
}

// =====================================================
//  API HELPERS
// =====================================================
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const res = await fetch(`${API}${path}`, { ...opts, headers });
  const data = await res.json().catch(() => ({}));
  // Localize via tResp() from i18n.js. If the code is unknown or i18n not
  // loaded, fall back to the English `error` from the backend.
  const localized = (typeof window.tResp === 'function') ? window.tResp(data) : null;
  if (res.status === 401 || res.status === 403) {
    // Token expired or invalid: log out and show the login screen.
    if (state.token) {
      clearAuth();
      state.currentScreen = 'auth';
      toast(localized || 'Your session has expired. Log in again.', 'error');
      render();
    }
    throw new Error(localized || data.error || 'Session expired');
  }
  if (!res.ok) throw new Error(localized || data.error || 'Error');
  return data;
}

// =====================================================
//  ESCAPE — defensa XSS para innerHTML con datos de usuario
// =====================================================
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
const _esc = escapeHtml;

// =====================================================
//  TOAST
// =====================================================
function toast(msg, type = '') {
  const root = document.getElementById('toast-root');
  const wrap = document.createElement('div');
  wrap.className = 'toast-wrap';
  // type es una clase (interna, no user-controlled), msg sí puede serlo
  wrap.innerHTML = `<div class="toast ${type}">${escapeHtml(msg)}</div>`;
  root.appendChild(wrap);
  setTimeout(() => wrap.remove(), 3500);
}

function render() {
  const root = document.getElementById('root');
  loadAuth();
  // Reset password: si la URL trae ?reset=...&id=... mostramos esa pantalla aunque haya token
  if (state.resetContext) {
    root.innerHTML = renderResetPassword();
    bindResetPassword();
    return;
  }
  if (!state.token) {
    // Login con MFA pendiente: mostramos la pantalla del código en vez del formulario
    if (state.loginPending) {
      root.innerHTML = renderLoginMFA();
      bindLoginMFA();
      return;
    }
    if (state.authMode === 'forgot') {
      root.innerHTML = renderForgot();
      bindForgot();
      return;
    }
    root.innerHTML = renderAuth();
    bindAuth();
    return;
  }
  // App shell con sidebar
  if (state.currentScreen === 'wizard') {
    root.innerHTML = renderWizard();
    bindWizard();
    return;
  }
  root.innerHTML = renderShell();
  bindNav();
  // Cargar contenido según pantalla
  loadCurrentScreen();
}

function bindNav() {

        state.wizard.step = 0;
        state.wizard.generating = false;
        state.wizard.generationDone = false;
        state.wizard.checkoutTriggered = false;
      }
      render();
    });
  });
  document.querySelectorAll('.theme-toggle-trigger').forEach(btn => {
    btn.addEventListener('click', () => {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
      }
    });
  });

function loadCurrentScreen() {
  const root = document.getElementById('screen-root');

  if (state.currentScreen === 'guide') return loadGuide(root);

  if (state.currentScreen === 'support') return loadSupport(root);
  if (state.currentScreen === 'bot') return loadBotDetail(root);

function bindForgot() {
  document.getElementById('back-to-login')?.addEventListener('click', () => {
    state.authMode = 'login';
    state.authError = null;
    state.authInfo = null;
    render();
  });
  document.getElementById('forgot-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('forgot-email').value.trim().toLowerCase();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      state.authError = 'Invalid email';
      render();
      return;
    }
    state.authError = null;
    state.authInfo = null;
    state.authLoading = true;
    render();
    try {
      const data = await api('/auth/forgot-password', {
        method: 'POST',
        body: JSON.stringify({ email }),
      });
      state.authInfo = data.message || 'If that email is registered, a link will arrive shortly.';
      state.authLoading = false;
      render();
    } catch (err) {
      // El backend siempre responde 200 con SAFE_OK, pero por si acaso
      state.authError = err.message || 'Error sending the link';
      state.authLoading = false;
      render();
    }
  });
}

function bindResetPassword() {
  const pwInput = document.getElementById('reset-pw');
  const togglePw = document.getElementById('reset-toggle-pw');
  togglePw?.addEventListener('click', () => {
    if (!pwInput) return;
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    togglePw.innerHTML = isHidden ? I.eyeOff : I.eye;
  });

  // Medidor de fuerza
  const strengthBox = document.getElementById('reset-pw-strength');
  const fill = document.getElementById('reset-pw-bar-fill');
  const rLen = document.getElementById('reset-r-len');
  const rUpper = document.getElementById('reset-r-upper');
  const rNum = document.getElementById('reset-r-num');
  pwInput?.addEventListener('input', () => {
    const v = pwInput.value || '';
    if (strengthBox) strengthBox.style.display = v.length > 0 ? '' : 'none';
    const okLen = v.length >= 8;
    const okUpper = /[A-Z]/.test(v);
    const okNum = /\d/.test(v);
    rLen?.classList.toggle('ok', okLen);
    rUpper?.classList.toggle('ok', okUpper);
    rNum?.classList.toggle('ok', okNum);
    const score = (okLen ? 1 : 0) + (okUpper ? 1 : 0) + (okNum ? 1 : 0) + (v.length >= 12 ? 1 : 0);
    if (fill) {
      fill.style.width = (score / 4) * 100 + '%';
      fill.className = 'pw-bar-fill s' + Math.max(1, score);
    }
  });

  document.getElementById('reset-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const newPassword = pwInput.value;
    const confirm = document.getElementById('reset-pw2').value;
    if (newPassword !== confirm) { state.authError = 'Passwords do not match'; render(); return; }
    if (newPassword.length < 8 || !/[A-Z]/.test(newPassword) || !/\d/.test(newPassword)) {
      state.authError = 'Password needs 8+ chars, uppercase and number';
      render();
      return;
    }
    state.authError = null;
    state.authLoading = true;
    render();
    try {
      await api('/auth/reset-password', {
        method: 'POST',
        body: JSON.stringify({
          userId: state.resetContext.userId,
          token: state.resetContext.token,
          newPassword,
        }),
      });
      // Limpiar URL, salir del modo reset, ir al login
      try { window.history.replaceState({}, '', '/en/app'); } catch (_) {}
      clearAuth();
      state.resetContext = null;
      state.authMode = 'login';
      state.authError = null;
      state.authLoading = false;
      toast('Password reset. Log in with the new one.', 'success');
      render();
    } catch (err) {
      state.authError = err.message || 'Could not reset';
      state.authLoading = false;
      render();
    }
  });
}

          ${state.authError ? `<div class="auth-error mb-4" style="margin-bottom:14px">${I.alert}<span>${state.authError}</span></div>` : ''}
        </div>

        <form class="auth-form" id="mfa-form">
          <div class="otp-row" id="otp-row">
            ${[0,1,2,3,4,5].map(i => `<input class="otp-input" type="tel" inputmode="numeric" maxlength="1" autocomplete="one-time-code" data-otp-i="${i}"/>`).join('')}
          </div>
          <button type="submit" class="btn btn-primary btn-large" style="width:100%;justify-content:center;margin-top:16px" id="mfa-submit">

function bindLoginMFA() {
  const inputs = document.querySelectorAll('.otp-input');
  inputs[0]?.focus();
  inputs.forEach((el, i) => {
    el.addEventListener('input', (e) => {
      const v = (e.target.value || '').replace(/\D/g, '').slice(0, 1);
      e.target.value = v;
      if (v && inputs[i + 1]) inputs[i + 1].focus();
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && inputs[i - 1]) {
        inputs[i - 1].focus();
      }
    });
    el.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData?.getData('text') || '').replace(/\D/g, '').slice(0, 6);
      [...text].forEach((ch, idx) => { if (inputs[idx]) inputs[idx].value = ch; });
      if (text.length === 6) inputs[5]?.focus();
    });
  });

  document.getElementById('mfa-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = [...inputs].map(x => x.value).join('');
    if (!/^\d{6}$/.test(code)) {
      state.authError = 'Enter the 6 digits of the code';
      render();
      return;
    }
    state.authError = null;
    state.authLoading = true;
    render();
    try {
      const data = await api('/auth/verify-login', {
        method: 'POST',
        body: JSON.stringify({
          pendingToken: state.loginPending.pendingToken,
          code,
        }),
      });
      if (data.token) {
        saveAuth(data.token, data.user);
        state.loginPending = null;
        state.currentScreen = 'dashboard';
        state.authLoading = false;
        toast(`Hi ${data.user?.name?.split(' ')[0] || ''}!`, 'success');
        render();
      }
    } catch (err) {
      state.authError = err.message || 'Incorrect code';
      state.authLoading = false;
      render();
    }
  });

  document.getElementById('resend-code')?.addEventListener('click', async () => {
    try {
      await api('/auth/resend-login-code', {
        method: 'POST',
        body: JSON.stringify({ pendingToken: state.loginPending.pendingToken }),
      });
      toast('Code resent. Check your email.', 'success');
    } catch (err) {
      toast(err.message || 'Could not resend', 'error');
    }
  });

  document.getElementById('back-to-login')?.addEventListener('click', () => {
    state.loginPending = null;
    state.authError = null;
    render();
  });
}

function bindAuth() {
  const isLogin = state.authMode === 'login';

  document.getElementById('toggle-mode')?.addEventListener('click', () => {
    state.authMode = state.authMode === 'login' ? 'signup' : 'login';
    state.authError = null;
    render();
  });

  // Mostrar/ocultar contraseña
  const pwInput = document.getElementById('password');
  const togglePw = document.getElementById('toggle-pw');
  togglePw?.addEventListener('click', () => {
    if (!pwInput) return;
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    togglePw.innerHTML = isHidden ? I.eyeOff : I.eye;
    togglePw.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
  });

  // Medidor de fuerza de contraseña (solo en signup)
  if (!isLogin) {
    const strengthBox = document.getElementById('pw-strength');
    const fill = document.getElementById('pw-bar-fill');
    const rLen = document.getElementById('pw-r-len');
    const rUpper = document.getElementById('pw-r-upper');
    const rNum = document.getElementById('pw-r-num');
    const updateStrength = () => {
      const v = pwInput.value || '';
      strengthBox.style.display = v.length > 0 ? '' : 'none';
      const okLen = v.length >= 8;
      const okUpper = /[A-Z]/.test(v);
      const okNum = /\d/.test(v);
      rLen?.classList.toggle('ok', okLen);
      rUpper?.classList.toggle('ok', okUpper);
      rNum?.classList.toggle('ok', okNum);
      const score = (okLen ? 1 : 0) + (okUpper ? 1 : 0) + (okNum ? 1 : 0) + (v.length >= 12 ? 1 : 0);
      const pct = (score / 4) * 100;
      if (fill) {
        fill.style.width = pct + '%';
        fill.className = 'pw-bar-fill s' + Math.max(1, score);
      }
    };
    pwInput?.addEventListener('input', updateStrength);

  } else {
    document.getElementById('forgot-pw')?.addEventListener('click', () => {
      state.authMode = 'forgot';
      state.authError = null;
      state.authInfo = null;
      render();
    });
  }

  document.getElementById('auth-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const isSignup = state.authMode === 'signup';

    // Validación cliente
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      state.authError = 'Invalid email'; render(); return;
    }
    if (isSignup) {
      const name = document.getElementById('name')?.value.trim() || '';
      const password2 = document.getElementById('password2')?.value || '';
      const terms = document.getElementById('terms')?.checked;
      if (name.length < 2) { state.authError = 'Enter your full name'; render(); return; }
      if (password.length < 8) { state.authError = 'Password must be at least 8 characters'; render(); return; }
      if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/\d/.test(password)) {
        state.authError = 'Password needs at least one uppercase, one lowercase and one number'; render(); return;
      }
      if (password !== password2) { state.authError = 'Passwords do not match'; render(); return; }
      if (!terms) { state.authError = 'You must accept the terms to create an account'; render(); return; }

      state.authError = null;
      state.authLoading = true;
      render();
      try {
        await api('/auth/signup', { method: 'POST', body: JSON.stringify({ email, password, name, lang: APP_LANG }) });
        // Cuenta creada — mandamos al usuario al formulario de login con un mensaje
        state.authMode = 'login';
        state.authError = null;
        state.authLoading = false;
        toast('Account created. We sent you a welcome email. Log in to verify your email.', 'success');
        render();
      } catch (err) {
        state.authError = err.message || 'Authentication error';
        state.authLoading = false;
        render();
      }
      return;
    }

    // Login
    if (password.length < 6) { state.authError = 'Password required'; render(); return; }
    state.authError = null;
    state.authLoading = true;
    render();
    try {
      const data = await api('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      if (data.requiresMFA && data.pendingToken) {
        // Email + contraseña OK. Toca pantalla del código.
        state.loginPending = { pendingToken: data.pendingToken, emailHint: data.emailHint || email };
        state.authLoading = false;
        state.authError = null;
        render();
        return;
      }
      // Fallback (login sin MFA, no debería pasar)
      if (data.token) {
        saveAuth(data.token, data.user);
        state.currentScreen = 'dashboard';
        state.authLoading = false;
        render();
      }
    } catch (err) {
      state.authError = err.message || 'Authentication error';
      state.authLoading = false;
      render();
    }
  });
}

let _lastWizardStep = -1;
function renderWizard() {
  const w = state.wizard;
  const cur = WIZARD_STEPS[w.step];
  const isLast = w.step === WIZARD_STEPS.length - 1;
  const isGenerate = w.step === 5;
  const stepChanged = _lastWizardStep !== w.step;
  _lastWizardStep = w.step;
  const fadeUp = stepChanged ? 'fade-up' : '';
  const fadeIn = stepChanged ? 'fade-in' : '';

  return `
    <div class="wizard ${fadeIn}">
      <div class="wizard-header">
        <div class="wizard-header-inner">
          <div class="wizard-top-row">
            <button class="wizard-back" id="wizard-prev" ${w.generating ? 'disabled' : ''}>
              ${w.step === 0 ? I.close : I.arrowLeft}
              <span>${w.step === 0 ? 'Close' : 'Back'}</span>
            </button>
            <div class="wizard-counter">${String(w.step + 1).padStart(2, '0')} / ${String(WIZARD_STEPS.length).padStart(2, '0')}</div>
          </div>
          <div class="wizard-progress">
            ${WIZARD_STEPS.map((_, i) => `<div class="wizard-progress-bar ${i <= w.step ? 'done' : ''}"></div>`).join('')}
          </div>
        </div>
      </div>
      <div class="wizard-body">
        <div class="wizard-body-inner">
          <h1 class="wizard-title ${fadeUp}">${cur.title}</h1>
          <p class="wizard-subtitle ${fadeUp}">${cur.subtitle}</p>
          <div class="${fadeUp}" style="${stepChanged ? 'animation-delay: 0.1s' : ''}">${renderWizardStep(w.step)}</div>
        </div>
      </div>
      <div class="wizard-footer">
        <div class="wizard-footer-inner">
          ${isGenerate ? renderGenerateCTA() : renderWizardCTA(isLast)}
        </div>
      </div>
    </div>
  `;
}

function renderWizardCTA(isLast) {
  return `
    <button class="btn btn-primary wizard-cta" id="wizard-next">
      <span>${isLast ? `Pay €9.99` : 'Continue'}</span>
      <span class="btn-arrow">→</span>
    </button>
    ${isLast ? '<div class="text-center text-mute mt-2" style="font-size:11px;margin-top:10px">✓ One-time payment · No subscriptions · The bot is yours forever</div>' : ''}
  `;
}

function renderGenerateCTA() {
  const w = state.wizard;
  if (w.generationDone) {
    return `
      <button class="btn btn-primary wizard-cta" id="wizard-next">
        <span>View summary</span>
        <span class="btn-arrow">→</span>
      </button>
    `;
  }
  return `
    <button class="btn wizard-cta" disabled>
      <span class="spinner"></span>
      <span>Generating bot...</span>
    </button>
  `;
}

function renderWizardStep(step) {
  if (step === 0) return renderStepName();
  if (step === 1) return renderStepStrategy();
  if (step === 2) return renderStepIndicators();
  if (step === 3) return renderStepRisk();
  if (step === 4) return renderStepFunded();
  if (step === 5) return renderStepGenerate();
  if (step === 6) return renderStepReview();
  if (step === 7) return renderStepPay();
  return '';
}

function rrFeedback(ratio) {
  if (ratio >= 3)   return { msg: 'Excellent — just 25% win rate is enough to be profitable', tone: 'pos' };
  if (ratio >= 2)   return { msg: 'Good — just 33% win rate is enough to be profitable', tone: 'pos' };
  if (ratio >= 1.5) return { msg: 'Acceptable — you need more than 40% win rate', tone: 'warn' };
  if (ratio >= 1)   return { msg: 'Tight — you need more than 50% win rate', tone: 'warn' };
  return            { msg: 'Risky — take profit is smaller than stop loss', tone: 'neg' };
}

function applyRRFeedback() {
  const card = document.getElementById('rr-card');
  const lbl = document.getElementById('lbl-rr');
  const hint = document.getElementById('lbl-rr-hint');
  if (!card || !lbl || !hint) return;
  const w = state.wizard.data.risk;
  const ratio = w.takeProfit / w.stopLoss;
  const fb = rrFeedback(ratio);
  lbl.textContent = `R:R Ratio = 1:${ratio.toFixed(1)}`;
  hint.textContent = fb.msg;
  const colors = {
    pos:  { bg: 'rgba(0,209,122,0.08)',  bd: 'rgba(0,209,122,0.22)',  fg: 'var(--pos)' },
    warn: { bg: 'rgba(255,176,32,0.08)', bd: 'rgba(255,176,32,0.22)', fg: '#FFB020' },
    neg:  { bg: 'rgba(255,71,87,0.08)',  bd: 'rgba(255,71,87,0.22)',  fg: 'var(--neg)' },
  }[fb.tone];
  card.style.background = colors.bg;
  card.style.borderColor = colors.bd;
  lbl.style.color = colors.fg;
}

function bindWizard() {
  const w = state.wizard;
  document.getElementById('wizard-prev')?.addEventListener('click', () => {
    if (w.generating) return;
    if (w.step === 0) {
      state.currentScreen = 'dashboard';
      render();
    } else {
      w.step--;
      render();
    }
  });
  document.getElementById('wizard-next')?.addEventListener('click', () => {
    handleWizardNext();
  });

  // Step 0: Name
  document.getElementById('bot-name')?.addEventListener('input', (e) => { w.data.name = e.target.value; });
  document.querySelectorAll('[data-market]').forEach(el => {
    el.addEventListener('click', () => {
      const m = MARKETS.find(x => x.id === el.dataset.market);
      w.data.market = m.id;
      w.data.pair = m.pairs[0];
      render();
    });
  });
  document.querySelectorAll('[data-pair]').forEach(el => {
    el.addEventListener('click', () => { w.data.pair = el.dataset.pair; render(); });
  });
  document.querySelectorAll('[data-avatar]').forEach(el => {
    el.addEventListener('click', () => { w.data.avatar = el.dataset.avatar; render(); });
  });

  // Step 1: Strategy
  document.querySelectorAll('[data-strategy]').forEach(el => {
    el.addEventListener('click', () => { w.data.strategy = el.dataset.strategy; render(); });
  });

  // Step 2: Indicators
  document.querySelectorAll('[data-indicator]').forEach(el => {
    el.addEventListener('click', () => {
      // Bloqueamos los indicadores marcados como no disponibles para que el
      // usuario no termine con un bot que no analiza lo que cree analizar.
      if (el.dataset.available === 'false' || el.disabled) {
        toast('This indicator will be available soon. For now choose RSI, EMA, MACD or Bollinger.', 'info');
        return;
      }
      const id = el.dataset.indicator;
      const idx = w.data.indicators.indexOf(id);
      if (idx >= 0) w.data.indicators.splice(idx, 1);
      else w.data.indicators.push(id);
      render();
    });
  });

  // Step 3: Risk
  // Timeframe selection
  document.querySelectorAll('[data-timeframe]').forEach(el => {
    el.addEventListener('click', () => { w.data.timeframe = el.dataset.timeframe; render(); });
  });
  // Lot mode (auto / fixed)
  document.querySelectorAll('[data-lotmode]').forEach(el => {
    el.addEventListener('click', () => {
      if (!w.data.lot) w.data.lot = { mode: 'auto', fixedLot: 0.10 };
      w.data.lot.mode = el.dataset.lotmode;
      render();
    });
  });
  // Fixed lot presets
  document.querySelectorAll('[data-fixedlot]').forEach(el => {
    el.addEventListener('click', () => {
      if (!w.data.lot) w.data.lot = { mode: 'fixed', fixedLot: 0.10 };
      w.data.lot.fixedLot = parseFloat(el.dataset.fixedlot);
      render();
    });
  });
  // Custom lot input
  document.getElementById('lot-custom')?.addEventListener('input', (e) => {
    if (!w.data.lot) w.data.lot = { mode: 'fixed', fixedLot: 0.10 };
    const v = parseFloat(e.target.value);
    if (isFinite(v)) w.data.lot.fixedLot = Math.max(0.01, Math.min(100, v));
  });
  document.getElementById('lot-custom')?.addEventListener('change', () => render());

  document.querySelectorAll('[data-leverage]').forEach(el => {
    el.addEventListener('click', () => { w.data.leverage = parseInt(el.dataset.leverage); render(); });
  });
  document.getElementById('leverage-custom')?.addEventListener('input', (e) => {
    const val = Math.max(1, Math.min(2000, parseInt(e.target.value) || 1));
    w.data.leverage = val;
  });
  document.getElementById('leverage-custom')?.addEventListener('change', () => render());
  const sliderMap = { sl: 'stopLoss', tp: 'takeProfit', ps: 'posSize', dl: 'dailyLoss' };
  const unitSuffix = w.data.risk.unit === 'percent' ? '%' : w.data.risk.unit === 'pips' ? ' pips' : '× ATR';
  const sliderLabels = {
    sl: (v) => `Stop loss · ${v}${unitSuffix}`,
    tp: (v) => `Take profit · ${v}${unitSuffix}`,
    ps: (v) => `Position size · ${v}% of capital`,
    dl: (v) => `Max daily loss · ${v}%`,
  };
  // SL/TP unit toggle. Switching units resets SL/TP to sensible defaults
  // for that unit (15 pips, 1.5×ATR, 1.5%) instead of carrying over the
  // old value which would be nonsensical (e.g. 1.5 pips or 15× ATR).
  document.querySelectorAll('[data-risk-unit]').forEach(btn => {
    btn.addEventListener('click', () => {
      const unit = btn.getAttribute('data-risk-unit');
      if (unit === w.data.risk.unit) return;
      w.data.risk.unit = unit;
      const defaults = { percent: { sl: 1.5, tp: 3.0 }, pips: { sl: 15, tp: 30 }, atr: { sl: 1.5, tp: 3.0 } };
      w.data.risk.stopLoss = defaults[unit].sl;
      w.data.risk.takeProfit = defaults[unit].tp;
      render();
    });
  });
  const updateSliderFill = (el) => {
    const min = parseFloat(el.min), max = parseFloat(el.max), val = parseFloat(el.value);
    el.style.setProperty('--val', ((val - min) / (max - min)) * 100 + '%');
  };
  ['sl','tp','ps','dl'].forEach(k => {
    const el = document.getElementById('r-' + k);
    if (!el) return;
    updateSliderFill(el);
    el.addEventListener('input', (e) => {
      const v = parseFloat(e.target.value);
      w.data.risk[sliderMap[k]] = v;
      updateSliderFill(el);
      const lbl = document.getElementById('lbl-' + k);
      if (lbl) lbl.textContent = sliderLabels[k](v);
      applyRRFeedback();
    });
  });
  applyRRFeedback();

  // Step 3: News filter
  document.getElementById('toggle-news')?.addEventListener('click', () => {
    w.data.news.enabled = !w.data.news.enabled;
    render();
  });
  document.getElementById('toggle-be')?.addEventListener('click', () => {
    w.data.risk.breakEven = w.data.risk.breakEven || { enabled: false };
    w.data.risk.breakEven.enabled = !w.data.risk.breakEven.enabled;
    if (w.data.risk.breakEven.enabled && w.data.risk.breakEven.triggerDistance == null) {
      w.data.risk.breakEven.triggerDistance = w.data.risk.unit === 'pips' ? 10 : 1.0;
    }
    render();
  });
  document.getElementById('toggle-trail')?.addEventListener('click', () => {
    w.data.risk.trailing = w.data.risk.trailing || { enabled: false };
    w.data.risk.trailing.enabled = !w.data.risk.trailing.enabled;
    if (w.data.risk.trailing.enabled && w.data.risk.trailing.distance == null) {
      w.data.risk.trailing.distance = w.data.risk.unit === 'pips' ? 10 : 1.0;
    }
    render();
  });
  ['be','trail'].forEach(k => {
    const el = document.getElementById('r-' + k);
    if (!el) return;
    const min = parseFloat(el.min), max = parseFloat(el.max);
    el.style.setProperty('--val', ((parseFloat(el.value) - min) / (max - min)) * 100 + '%');
    el.addEventListener('input', (e) => {
      const v = parseFloat(e.target.value);
      const suf = w.data.risk.unit === 'percent' ? '%' : w.data.risk.unit === 'pips' ? ' pips' : '× ATR';
      if (k === 'be') { w.data.risk.breakEven.triggerDistance = v; document.getElementById('lbl-be').textContent = `Trigger when profit ≥ ${v}${suf}`; }
      if (k === 'trail') { w.data.risk.trailing.distance = v; document.getElementById('lbl-trail').textContent = `Distance · ${v}${suf}`; }
      el.style.setProperty('--val', ((v - min) / (max - min)) * 100 + '%');
    });
  });
  document.querySelectorAll('[data-news-impact]').forEach(el => {
    el.addEventListener('click', () => { w.data.news.impactMin = el.dataset.newsImpact; render(); });
  });
  ['newsbef', 'newsaft'].forEach(k => {
    const el = document.getElementById('r-' + k);
    if (!el) return;
    updateSliderFill(el);
    el.addEventListener('input', (e) => {
      const v = parseInt(e.target.value, 10);
      if (k === 'newsbef') w.data.news.beforeMin = v;
      else w.data.news.afterMin = v;
      updateSliderFill(el);
      const lbl = document.getElementById('lbl-' + k);
      if (lbl) lbl.textContent = (k === 'newsbef' ? 'Pause before news · ' : 'Resume after news · ') + v + ' min';
    });
  });
  document.querySelectorAll('[data-news-event]').forEach(el => {
    el.addEventListener('click', (ev) => {
      ev.preventDefault();
      const id = el.dataset.newsEvent;
      const idx = w.data.news.events.indexOf(id);
      if (idx >= 0) w.data.news.events.splice(idx, 1);
      else w.data.news.events.push(id);
      el.classList.toggle('selected');
    });
  });
  document.getElementById('news-events-all')?.addEventListener('click', (ev) => {
    ev.preventDefault();
    w.data.news.events = NEWS_EVENTS.map(e => e.id);
    render();
  });
  document.getElementById('news-events-none')?.addEventListener('click', (ev) => {
    ev.preventDefault();
    w.data.news.events = [];
    render();
  });

  // Step 4: Funded
  document.getElementById('toggle-funded')?.addEventListener('click', () => {
    w.data.funded.enabled = !w.data.funded.enabled;
    if (!w.data.funded.enabled) w.data.funded.firm = null;
    render();
  });
  document.querySelectorAll('[data-firm]').forEach(el => {
    el.addEventListener('click', () => { w.data.funded.firm = el.dataset.firm; render(); });
  });

  // Step 5: Generate (autorun on enter)
  if (w.step === 5 && !w.generating && !w.generationDone) {
    runGeneration();
  }

  // Step 7: Pay (autorun checkout on enter)
  if (w.step === 7 && !w.checkoutTriggered) {
    w.checkoutTriggered = true;
    setTimeout(() => startCheckout(), 600);
  }
}

function validateWizardStep(step) {
  const d = state.wizard.data;
  if (step === 0) {
    if (!d.name || !d.name.trim()) return 'Give your bot a name';
    if (d.name.length > 60) return 'Name is too long (max 60)';
    if (!d.market || !d.pair) return 'Pick a market and a pair';
  }
  if (step === 1 && !d.strategy) return 'Pick a strategy';
  if (step === 2 && (!d.indicators || d.indicators.length === 0)) return 'Select at least one indicator';
  if (step === 4 && d.funded.enabled && !d.funded.firm) return 'Select your prop firm or disable the funded account';
  return null;
}

function handleWizardNext() {
  const w = state.wizard;
  const err = validateWizardStep(w.step);
  if (err) { toast(err, 'error'); return; }
  if (w.step === WIZARD_STEPS.length - 1) {
    return startCheckout();
  }
  w.step++;
  render();
}

async function runGeneration() {
  const w = state.wizard;
  w.generating = true;
  const durations = [800, 1200, 1500, 2000, 1500, 1000, 1500, 800];
  const phaseRows = document.querySelectorAll('.phase-row');

  for (let i = 0; i < phaseRows.length; i++) {
    const row = phaseRows[i];
    if (!row) continue;
    row.style.opacity = '1';
    const dot = row.querySelector('.phase-dot');
    if (dot) {
      dot.style.background = 'var(--text)';
      dot.innerHTML = '<span class="spinner" style="width:10px;height:10px;border-width:1.5px;border-color:transparent;border-top-color:#000"></span>';
    }
    await new Promise(r => setTimeout(r, durations[i]));
    if (dot) {
      dot.style.background = 'var(--pos)';
      dot.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    }
  }

  w.generating = false;
  w.generationDone = true;
  render();
}

async function startCheckout() {
  const w = state.wizard;
  // Guardar config para crear bot tras pago
  const botConfig = {
    name: w.data.name,
    description: `${w.data.strategy} · ${w.data.pair}`,
    strategy: w.data.strategy,
    parameters: {
      market: w.data.market, pair: w.data.pair, leverage: w.data.leverage,
      avatar: w.data.avatar, indicators: w.data.indicators,
      timeframe: w.data.timeframe, lot: w.data.lot,
      risk: w.data.risk, news: w.data.news, funded: w.data.funded,
    },
    _ts: Date.now(),
  };
  localStorage.setItem('pendingBotConfig', JSON.stringify(botConfig));

  try {
    const res = await api('/payments/checkout-custom', {
      method: 'POST',
      body: JSON.stringify({ botName: w.data.name }),
    });
    if (res.url) {
      window.location.href = res.url;
    }
  } catch (e) {
    toast('Error creating payment session', 'error');
  }
}

            <div class="text-dim" style="font-size:12px;margin-bottom:12px">We have sent a 6-digit code to <strong id="email-change-hint" style="color:var(--text)"></strong>. Enter it here:</div>
            <div class="otp-row" style="margin-bottom:14px">
              ${[0,1,2,3,4,5].map(i => `<input class="otp-input email-change-otp" type="tel" inputmode="numeric" maxlength="1" data-otp-i="${i}"/>`).join('')}
            </div>
            <div style="display:flex;gap:10px">
              <button type="button" class="btn btn-primary" id="email-change-confirm" style="flex:1;justify-content:center">Confirm</button>
              <button type="button" class="btn btn-soft" id="email-change-cancel" style="white-space:nowrap">Cancel</button>
            </div>
          </div>
        </form>
      </div>

      <div class="account-section">
        <h2 class="account-section-title">Security</h2>

        <form class="card account-form" id="account-pw-form">
          <label class="field-label" for="acc-pw-current">Current password</label>
          <input class="input" id="acc-pw-current" type="password" required autocomplete="current-password" placeholder="••••••••"/>

          <label class="field-label" for="acc-pw-new" style="margin-top:14px">New password</label>
          <input class="input" id="acc-pw-new" type="password" required minlength="8" autocomplete="new-password" placeholder="Minimum 8 characters"/>
          <div id="acc-pw-strength" style="display:none;margin-top:8px">
            <div class="pw-bar"><div class="pw-bar-fill" id="acc-pw-bar-fill"></div></div>
            <div class="pw-rules">
              <span class="pw-rule" id="acc-r-len">${I.dot} 8+ characters</span>
              <span class="pw-rule" id="acc-r-upper">${I.dot} One uppercase</span>
              <span class="pw-rule" id="acc-r-num">${I.dot} One number</span>
            </div>
          </div>

          <label class="field-label" for="acc-pw-new2" style="margin-top:14px">Repeat new password</label>
          <input class="input" id="acc-pw-new2" type="password" required autocomplete="new-password" placeholder="Repeat the new password"/>

          <button type="submit" class="btn btn-primary" style="margin-top:16px;width:100%;justify-content:center">Change password</button>
        </form>

        <button class="btn btn-soft" id="logout-everywhere-btn" style="margin-top:14px;width:100%;justify-content:center">
          ${I.logout} Sign out from all devices
        </button>
        <div class="text-dim" style="font-size:12px;margin-top:8px;line-height:1.5">
          Invalidates your session on this and every other browser or mobile where you were signed in. Useful if a device is lost.
        </div>
      </div>

      <div class="account-section">
        <h2 class="account-section-title">Payments and bots</h2>
        <div class="card fade-up" style="display:flex;align-items:center;gap:14px;cursor:pointer" id="recover-bots-btn">
          ${I.download}
          <div style="flex:1">
            <div class="h3">Recover paid bots</div>
            <div class="text-dim mt-2" style="font-size:13px">If you paid for a bot but it does not appear in your dashboard, click here. We search Lemon Squeezy for orders in your name and create the missing bots.</div>
          </div>
          ${I.arrow}
        </div>
      </div>

      <div class="account-section">
        <h2 class="account-section-title">Language · Idioma</h2>
        <div class="card fade-up" style="display:flex;align-items:center;gap:10px">
          <button class="btn ${APP_LANG === 'es' ? 'btn-primary' : 'btn-soft'}" style="flex:1;justify-content:center" id="lang-es-btn">Español</button>
          <button class="btn ${APP_LANG === 'en' ? 'btn-primary' : 'btn-soft'}" style="flex:1;justify-content:center" id="lang-en-btn">English</button>
        </div>
      </div>

      <div class="account-section">
        <h2 class="account-section-title">Help and account</h2>

        <div class="card fade-up" style="display:flex;align-items:center;gap:14px;cursor:pointer" id="goto-support">
          ${I.mail}
          <div style="flex:1">
            <div class="h3">Contact support</div>
          </div>
          ${I.arrow}
        </div>

        <button class="btn btn-soft" id="logout-btn" style="margin-top:12px;width:100%;justify-content:center;color:var(--neg);border-color:rgba(255,71,87,0.2)">${I.logout} Log out</button>
      </div>
    </div>
  `;

  // Logout
  document.getElementById('logout-btn')?.addEventListener('click', () => {
    clearAuth();
    state.currentScreen = 'auth';
    render();
  });
  document.getElementById('goto-support')?.addEventListener('click', () => {
    state.currentScreen = 'support';
    render();
  });

  // Language switch: persist choice (localStorage for the app redirect +
  // backend so transactional emails arrive in the chosen language) and
  // reload the right localized app.
  document.getElementById('lang-es-btn')?.addEventListener('click', async () => {
    try { localStorage.setItem('lang', 'es'); } catch(e) {}
    try { await api('/auth/lang', { method: 'POST', body: JSON.stringify({ lang: 'es' }) }); } catch (e) {}
    if (window.location.pathname.startsWith('/en/')) window.location.href = '/app';
  });
  document.getElementById('lang-en-btn')?.addEventListener('click', async () => {
    try { localStorage.setItem('lang', 'en'); } catch(e) {}
    try { await api('/auth/lang', { method: 'POST', body: JSON.stringify({ lang: 'en' }) }); } catch (e) {}
    if (!window.location.pathname.startsWith('/en/')) window.location.href = '/en/app';
  });
  document.getElementById('logout-everywhere-btn')?.addEventListener('click', async () => {
    if (!confirm('Sign out from all devices? You will have to log in again on every browser or phone where you were using YudBot.')) return;
    try {
      await api('/auth/logout-everywhere', { method: 'POST' });
      toast('Signed out from all devices', 'success');
      // Our own JWT just got invalidated by the tokenVersion bump, so the
      // next backend call would 403 us anyway. Drop straight to the login.
      clearAuth();
      state.currentScreen = 'auth';
      render();
    } catch (e) {
      toast(e.message || 'Error', 'error');
    }
  });
  document.getElementById('recover-bots-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('recover-bots-btn');
    if (btn.dataset.busy === '1') return;
    btn.dataset.busy = '1';
    const originalText = btn.querySelector('.h3')?.textContent;
    if (btn.querySelector('.h3')) btn.querySelector('.h3').textContent = 'Searching orders…';
    try {
      const res = await api('/payments/recover', { method: 'POST' });
      if (res.count > 0) {
        toast(`✅ ${res.count} bot${res.count > 1 ? 's' : ''} recovered. Go to the Dashboard.`, 'success');
      } else {
        toast('No pending payments under your name', 'success');
      }
    } catch (e) {
      toast(e.message || 'Error recovering bots', 'error');
    } finally {
      btn.dataset.busy = '0';
      if (btn.querySelector('.h3') && originalText) btn.querySelector('.h3').textContent = originalText;
    }
  });

  // Update name
  document.getElementById('account-name-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('acc-name').value.trim();
    if (name.length < 2) { toast('Enter your full name', 'error'); return; }
    try {
      const data = await api('/auth/me', { method: 'PUT', body: JSON.stringify({ name }) });
      state.user = data.user;
      try { localStorage.setItem('user', JSON.stringify(data.user)); } catch (_) {}
      toast('Name updated', 'success');
      render();
    } catch (err) {
      toast(err.message || 'Could not update', 'error');
    }
  });

  // Update email — pide código al nuevo email antes de aplicar el cambio
  const emailVerifyBox = document.getElementById('email-change-verify');
  const emailHintEl = document.getElementById('email-change-hint');
  const emailOtpInputs = document.querySelectorAll('.email-change-otp');

  // OTP UX (auto-avance, backspace, paste)
  emailOtpInputs.forEach((el, i) => {
    el.addEventListener('input', (e) => {
      const v = (e.target.value || '').replace(/\D/g, '').slice(0, 1);
      e.target.value = v;
      if (v && emailOtpInputs[i + 1]) emailOtpInputs[i + 1].focus();
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && emailOtpInputs[i - 1]) emailOtpInputs[i - 1].focus();
    });
    el.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData?.getData('text') || '').replace(/\D/g, '').slice(0, 6);
      [...text].forEach((ch, idx) => { if (emailOtpInputs[idx]) emailOtpInputs[idx].value = ch; });
      if (text.length === 6) emailOtpInputs[5]?.focus();
    });
  });

  document.getElementById('account-email-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('acc-email').value.trim().toLowerCase();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Invalid email', 'error'); return; }
    if (email === (state.user?.email || '').toLowerCase()) { toast('That email is already yours', 'info'); return; }
    try {
      const data = await api('/auth/me', { method: 'PUT', body: JSON.stringify({ email }) });
      if (data.emailChangeRequested) {
        // Mostrar el bloque de OTP con la pista del email
        emailHintEl.textContent = data.emailHint || email;
        emailVerifyBox.style.display = '';
        emailOtpInputs.forEach(x => x.value = '');
        emailOtpInputs[0]?.focus();
        toast('Code sent to the new email', 'success');
      } else {
        toast('Email updated', 'success');
        state.user = data.user;
        try { localStorage.setItem('user', JSON.stringify(data.user)); } catch (_) {}
        render();
      }
    } catch (err) {
      toast(err.message || 'Could not update', 'error');
    }
  });

  document.getElementById('email-change-cancel')?.addEventListener('click', () => {
    emailVerifyBox.style.display = 'none';
    emailOtpInputs.forEach(x => x.value = '');
  });

  document.getElementById('email-change-confirm')?.addEventListener('click', async () => {
    const code = [...emailOtpInputs].map(x => x.value).join('');
    if (!/^\d{6}$/.test(code)) { toast('Enter the 6 digits of the code', 'error'); return; }
    try {
      const data = await api('/auth/verify-email-change', { method: 'POST', body: JSON.stringify({ code }) });
      state.user = data.user;
      try { localStorage.setItem('user', JSON.stringify(data.user)); } catch (_) {}
      toast('Email updated successfully', 'success');
      emailVerifyBox.style.display = 'none';
      render();
    } catch (err) {
      toast(err.message || 'Incorrect code', 'error');
    }
  });

  // Password strength meter
  const pwNew = document.getElementById('acc-pw-new');
  const fill = document.getElementById('acc-pw-bar-fill');
  const strengthBox = document.getElementById('acc-pw-strength');
  const rLen = document.getElementById('acc-r-len');
  const rUpper = document.getElementById('acc-r-upper');
  const rNum = document.getElementById('acc-r-num');
  pwNew?.addEventListener('input', () => {
    const v = pwNew.value || '';
    if (strengthBox) strengthBox.style.display = v.length > 0 ? '' : 'none';
    const okLen = v.length >= 8;
    const okUpper = /[A-Z]/.test(v);
    const okNum = /\d/.test(v);
    rLen?.classList.toggle('ok', okLen);
    rUpper?.classList.toggle('ok', okUpper);
    rNum?.classList.toggle('ok', okNum);
    const score = (okLen ? 1 : 0) + (okUpper ? 1 : 0) + (okNum ? 1 : 0) + (v.length >= 12 ? 1 : 0);
    if (fill) {
      fill.style.width = (score / 4) * 100 + '%';
      fill.className = 'pw-bar-fill s' + Math.max(1, score);
    }
  });

  // Change password
  document.getElementById('account-pw-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const currentPassword = document.getElementById('acc-pw-current').value;
    const newPassword = document.getElementById('acc-pw-new').value;
    const confirm2 = document.getElementById('acc-pw-new2').value;
    if (newPassword !== confirm2) { toast('New passwords do not match', 'error'); return; }
    if (newPassword.length < 8 || !/[A-Z]/.test(newPassword) || !/\d/.test(newPassword)) {
      toast('New password needs 8+ chars, uppercase and number', 'error');
      return;
    }
    if (currentPassword === newPassword) { toast('New password must differ from the current one', 'error'); return; }
    try {
      await api('/auth/change-password', { method: 'POST', body: JSON.stringify({ currentPassword, newPassword }) });
      toast('Password updated', 'success');
      // Reset form
      document.getElementById('acc-pw-current').value = '';
      document.getElementById('acc-pw-new').value = '';
      document.getElementById('acc-pw-new2').value = '';
      if (strengthBox) strengthBox.style.display = 'none';
    } catch (err) {
      toast(err.message || 'Could not change password', 'error');
    }
  });
}

function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[¿?¡!,.;:]/g, '').trim();
}
function findAnswer(q) {
  const n = normalize(q);
  if (!n) return null;
  // conversacional
  for (const k in CONV) {
    for (const t of CONV[k].triggers) {
      const tn = normalize(t);
      if (n === tn || n.split(' ').includes(tn) || n.startsWith(tn + ' ') || n.endsWith(' ' + tn)) {
        return { type: 'conv', text: CONV[k].r[Math.floor(Math.random() * CONV[k].r.length)] };
      }
    }
  }
  // FAQ — scoring por longitud de palabra clave + bonus por match en pregunta
  const ranked = [];
  for (const f of FAQ_DB) {
    let s = 0;
    for (const k of f.kw) {
      const kn = normalize(k);
      if (n.includes(kn)) s += kn.length * 2;
    }
    // Bonus si alguna palabra clave aparece en la pregunta directamente
    for (const w of n.split(' ').filter(w => w.length > 3)) {
      if (normalize(f.q).includes(w)) s += 1;
    }
    if (s > 0) ranked.push({ faq: f, score: s });
  }
  ranked.sort((a, b) => b.score - a.score);
  if (ranked.length === 0 || ranked[0].score < 4) {
    // Sugerir las 3 mejor rankeadas si hay alguna con puntuación > 0
    const suggestions = ranked.slice(0, 3).map(r => r.faq);
    return { type: 'fallback', suggestions };
  }
  return { type: 'faq', text: ranked[0].faq.a, faq: ranked[0].faq };
}

function loadSupport(root) {
  const s = state.support;
  const categories = [...new Set(FAQ_DB.map(f => f.cat))];
  const filteredFaqs = s.category
    ? FAQ_DB.filter(f => f.cat === s.category)

      <div id="chat-msgs" style="flex:1;display:flex;flex-direction:column;gap:12px;padding-bottom:20px">

            </div>
          </div>
        `).join('')}
        ${s.typing ? `
          <div style="display:flex;justify-content:flex-start">
            <div style="padding:14px 18px;border-radius:16px;background:var(--bg-card);border:1px solid var(--border);display:flex;gap:5px">
              <span style="width:7px;height:7px;border-radius:4px;background:var(--text-mute);animation:bounce 1.4s infinite;animation-delay:0s"></span>
              <span style="width:7px;height:7px;border-radius:4px;background:var(--text-mute);animation:bounce 1.4s infinite;animation-delay:0.15s"></span>
              <span style="width:7px;height:7px;border-radius:4px;background:var(--text-mute);animation:bounce 1.4s infinite;animation-delay:0.3s"></span>
            </div>
          </div>
        ` : ''}
        ${s.showFaqs && !s.typing ? `
          <div style="margin-top:8px">
            <div class="label-up" style="margin-bottom:10px">${s.category ? s.category : 'Categories'}</div>
            ${!s.category ? `
              <div class="chip-row" style="margin-bottom:14px">
                ${categories.map(c => `
                  <button class="chip" data-cat="${c}">${c}</button>
                `).join('')}
              </div>
              <div class="label-up" style="margin-bottom:10px;margin-top:14px">Frequently asked questions</div>
            ` : `
              <button class="btn btn-soft" id="back-cats" style="margin-bottom:14px;font-size:12px;padding:6px 12px;">${I.arrowLeft} All categories</button>
            `}
            <div class="flex flex-col gap-2">
              ${filteredFaqs.map(f => `

        ${s.showFollowUp && !s.typing ? `
          <div style="margin-top:8px">

      </div>

  `;

  // Auto scroll
  setTimeout(() => {
    const msgs = document.getElementById('chat-msgs');
    if (msgs) msgs.scrollIntoView({ block: 'end' });

    const input = document.getElementById('chat-input');
    const v = input.value.trim();
    if (!v) return;
    input.value = '';
    pushMsg('user', v);
    // Si el usuario respondió con un número y tenemos sugerencias previas, lo tratamos como elegir esa
    const numMatch = /^[1-3]$/.exec(v);
    if (numMatch && state.support._lastSuggestions && state.support._lastSuggestions.length) {
      const idx = parseInt(numMatch[0], 10) - 1;
      const f = state.support._lastSuggestions[idx];
      delete state.support._lastSuggestions;
      if (f) {
        simulate(() => { pushMsg('bot', f.a); state.support.showFollowUp = true; loadSupport(document.getElementById('screen-root')); });
        return;
      }
    }
    delete state.support._lastSuggestions;
    simulate(() => {
      const result = findAnswer(v);

        loadSupport(document.getElementById('screen-root'));
        return;

          txt += ' Do you mean one of these?\n\n' + result.suggestions.map((f, i) => `${i + 1}. ${f.q}`).join('\n');
          txt += '\n\nType the number or rephrase your question.';
          state.support._lastSuggestions = result.suggestions;
        } else {
          txt = 'I didn\'t find anything related. Type "help" to see what I can do, or contact support@yudbot.com.';
        }
        pushMsg('bot', txt);
        loadSupport(document.getElementById('screen-root'));
        return;
      }
      // type === 'conv' or 'faq'
      pushMsg('bot', result.text);
      state.support.showFollowUp = (result.type === 'faq');
      loadSupport(document.getElementById('screen-root'));
    });
  };
  document.getElementById('chat-send')?.addEventListener('click', send);
  document.getElementById('chat-input')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') send();
  });

  // Follow-up buttons
  document.getElementById('resolved-yes')?.addEventListener('click', () => {
    pushMsg('user', 'Yes, thanks');
    state.support.showFollowUp = false;
    simulate(() => { pushMsg('bot', 'Great! Glad I could help 😊'); state.support.showFaqs = true; loadSupport(document.getElementById('screen-root')); });
  });
  document.getElementById('resolved-no')?.addEventListener('click', () => {
    pushMsg('user', 'No, I still have the question');
    state.support.showFollowUp = false;
    simulate(() => { pushMsg('bot', 'OK, try another question or rephrase it 👇'); state.support.showFaqs = true; loadSupport(document.getElementById('screen-root')); });
  });
}

function pushMsg(from, text) {
  state.support.messages.push({ from, text });
  state.support.showFaqs = false;

function simulate(cb) {
  state.support.typing = true;
  loadSupport(document.getElementById('screen-root'));
  setTimeout(() => {

    cb();
  }, 600 + Math.random() * 600);
}

async function verifyPendingPayment() {
  const params = new URLSearchParams(window.location.search);
  const orderNumber = params.get('order_number');

  let botConfig = null;
  try { botConfig = JSON.parse(localStorage.getItem('pendingBotConfig') || 'null'); } catch (e) {}

  // Solo intentamos verificar cuando hay señal real de retorno desde Lemon:
  //   - order_number en la URL (redirect tras pago), o
  //   - pendingBotConfig reciente (<60 min) para cubrir el caso de que
  //     Lemon no añada order_number al redirect.
  // Si el config es viejo, lo limpiamos en silencio: el usuario ya no
  // está intentando completar ese pago. Sin esto, recargar /app muestra
  // "Orden no encontrada" en bucle.
  const STALE_MS = 60 * 60 * 1000; // 60 min
  if (botConfig && botConfig._ts && Date.now() - botConfig._ts > STALE_MS) {
    localStorage.removeItem('pendingBotConfig');
    botConfig = null;
  }
  if (!orderNumber && !botConfig) return;

  loadAuth();
  if (!state.token) return;

  const cleanUrl = () => window.history.replaceState({}, '', '/en/app');

  try {
    const res = await api('/payments/verify', {
      method: 'POST',
      body: JSON.stringify({ orderNumber, botConfig }),
    });
    localStorage.removeItem('pendingBotConfig');
    cleanUrl();
    state.currentScreen = 'dashboard';
    toast(`Bot "${res.bot?.name || 'created'}" added to your account`, 'success');
  } catch (e) {
    cleanUrl();
    const msg = (e && e.message) || '';
    // Si la orden no existe (404), eliminamos el pendingBotConfig para
    // que recargas posteriores no muestren el error en bucle. Solo
    // mantenemos el config si el error parece transitorio (5xx, red).
    const stale = /orden no encontrada|order not found/i.test(msg);
    if (stale) {
      localStorage.removeItem('pendingBotConfig');
      // Si el usuario llegó aquí con order_number explícito, sí avisamos
      // (significa que Lemon le redirigió pero algo falló). Sin order_number
      // suele ser config viejo de un test → silencioso.
      if (orderNumber) {
        toast('We could not verify your payment. If the charge went through, contact support.', 'error');
      }
    } else {
      toast(msg || 'Could not verify payment. Retry or contact support.', 'error');
    }
  }
}

// =====================================================
//  INIT
// =====================================================
function detectResetContext() {
  try {
    const params = new URLSearchParams(window.location.search);
    const reset = params.get('reset');
    const id = params.get('id');
    if (reset && id) {
      state.resetContext = { token: reset, userId: id };
    }
  } catch (e) {}
}

(async () => {
  detectResetContext();
  await verifyPendingPayment();
  render();
})();

// Cleanup: unregister any legacy service worker from the old PWA build
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((r) => r.unregister()));
}
</script>
