<script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #FFFFFF;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #000;
  }
  body.dark { background: #000; color: #fff; }
  @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(2.4); opacity: 0; } }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,0.4); }

  ::selection { background: #000; color: #fff; }
  body.dark ::selection { background: #fff; color: #000; }

  /* tweaks panel */
  .tweaks {
    position: fixed; right: 16px; bottom: 16px; z-index: 1000;
    background: #fff; border-radius: 16px; padding: 14px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06);
    font-family: 'Inter', system-ui; min-width: 200px;
    display: none;
  }
  .tweaks.open { display: block; }
  .tweaks h4 { margin: 0 0 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: #888; font-weight: 600; }
  .tweaks-row { display: flex; gap: 4px; margin-bottom: 10px; }
  .tweaks-btn { flex: 1; padding: 6px 8px; border: 1px solid #e5e5e5; border-radius: 8px; background: #fff; cursor: pointer; font-size: 11px; font-weight: 600; color: #555; }
  .tweaks-btn.on { background: #111; color: #fff; border-color: #111; }

  /* Page transitions */
  .page-enter { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  .fade-in { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Tweaks panel (only mode toggle) -->
<div id="tweaks" class="tweaks">
  <h4>Modo</h4>
  <div class="tweaks-row" id="tw-mode">
    <button class="tweaks-btn" data-mode="light">Light</button>
    <button class="tweaks-btn" data-mode="dark">Dark</button>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/themes.jsx?v=36"></script>

<script type="text/babel" src="lib/screens/deploy-guide.jsx?v=36"></script>
<script type="text/babel" src="lib/screens/auth.jsx?v=36"></script>
<script type="text/babel" src="lib/screens/account.jsx?v=36"></script>
<script type="text/babel" src="lib/screens/account-sections.jsx?v=36"></script>
<script type="text/babel" src="lib/app.jsx?v=36"></script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "mono",
  "mode": "light",
  "view": "single"
}/*EDITMODE-END*/;

function Root() {
  // Versioned storage so updated TWEAK_DEFAULTS take precedence over old sessions
  const STORAGE_VERSION = 'v3';
  const STORAGE_KEY = 'botapp-tweaks-' + STORAGE_VERSION;
  // Cleanup older versions
  try { localStorage.removeItem('botapp-tweaks'); localStorage.removeItem('botapp-tweaks-v2'); } catch(e) {}
  const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch (e) { return null; } })() || {};
  const [mode, setMode] = React.useState(saved.mode || TWEAK_DEFAULTS.mode);

  // expose for tweaks panel
  React.useEffect(() => {
    window.__setMode = (m) => { setMode(m); save({ mode: m }); };
    function save(patch) {
      const cur = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const next = { ...cur, ...patch };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
    }
    refreshTweaksUI();
  }, [mode]);

  // Sincronizar dark mode con body class
  React.useEffect(() => {
    document.body.classList.toggle('dark', mode === 'dark');
  }, [mode]);

  return <BotApp themeKey="mono" mode={mode} setMode={setMode} setThemeKey={() => {}}/>;
}

function refreshTweaksUI() {
  setTimeout(() => {
    const cur = JSON.parse(localStorage.getItem('botapp-tweaks-v3') || '{}');
    const tdef = { mode: TWEAK_DEFAULTS.mode, ...cur };
    document.querySelectorAll('#tw-mode button').forEach(b => b.classList.toggle('on', b.dataset.mode === tdef.mode));
  }, 50);
}

document.querySelectorAll('#tw-mode button').forEach(b => b.onclick = () => window.__setMode(b.dataset.mode));

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);

// Tweaks toggle protocol
window.addEventListener('message', (e) => {
  if (!e.data) return;
  if (e.data.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('open');
  if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');
</script>
</body>
</html>
